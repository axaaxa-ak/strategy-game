<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>世界大戦略 1936</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a0e;--pn:#091420;--b1:#162434;--b2:#1e3448;--ac:#c8a248;--a2:rgba(200,162,72,.13);--a3:#8a6e2e;--tx:#b8ccd8;--dm:#486070;--fn:'Share Tech Mono',monospace;--hd:'Orbitron',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);overflow:hidden;user-select:none;touch-action:none}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:9999}
/* LOADING */
#ld{position:fixed;inset:0;background:#02080e;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:8000;padding:20px}
#ld.on{display:flex}
.ld-t{font-family:var(--hd);font-size:20px;color:var(--ac);letter-spacing:3px;margin-bottom:18px;text-align:center}
.ld-b{width:min(340px,80vw);height:4px;background:var(--b1);margin-bottom:8px;border-radius:2px}
.ld-f{height:100%;background:var(--ac);width:0%;transition:width .2s;border-radius:2px}
.ld-s{font-size:8px;color:var(--dm);letter-spacing:2px;margin-bottom:14px;text-align:center}
#ld-err{display:none;max-width:min(480px,90vw);margin-top:14px;padding:14px 18px;background:rgba(200,22,48,.12);border:1px solid rgba(200,22,48,.5);color:#ff8080;font-size:9px;line-height:1.9;text-align:left;white-space:pre-line}
#ld-err.on{display:block}
/* FACTION SELECT */
#fsel{position:fixed;inset:0;background:rgba(2,8,14,.98);display:flex;flex-direction:column;align-items:center;z-index:7000;overflow:hidden}
#fsel.off{display:none}
.fh{padding:16px 16px 8px;text-align:center;flex-shrink:0}
.fh-t{font-family:var(--hd);font-size:19px;color:var(--ac);letter-spacing:4px;margin-bottom:4px}
.fh-s{font-size:8px;color:var(--dm);letter-spacing:3px;margin-bottom:10px}
.ftabs{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:8px}
.ftab{background:rgba(255,255,255,.04);border:1px solid var(--b2);color:var(--dm);padding:5px 12px;cursor:pointer;font-family:var(--fn);font-size:8px;letter-spacing:1px;transition:.15s}
.ftab.on{background:var(--a2);border-color:var(--ac);color:var(--ac)}
.fbody{flex:1;overflow-y:auto;padding:8px 12px 12px;width:100%;max-width:1020px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;-webkit-overflow-scrolling:touch}
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px}
.fc{background:rgba(255,255,255,.03);border:1px solid var(--b2);padding:11px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.fc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--cc,#555)}
.fc:hover{border-color:var(--cc,#888);background:rgba(255,255,255,.06);transform:translateY(-1px)}
.fc-sn{font-family:var(--hd);font-size:9px;letter-spacing:2px;margin-bottom:2px;color:var(--cc,#888)}
.fc-n{font-family:var(--hd);font-size:12px;color:#ddeeff;line-height:1.2;margin-bottom:2px}
.fc-d{font-size:7.5px;color:var(--dm);line-height:1.7;margin-bottom:8px;min-height:44px}
.fc-b{width:100%;background:var(--a2);border:1px solid var(--a3);color:var(--ac);padding:6px;font-family:var(--fn);font-size:8px;letter-spacing:2px;cursor:pointer;transition:.15s}
.fc-b:hover{background:rgba(200,162,72,.22);border-color:var(--ac)}
/* TOPBAR */
#tb{position:fixed;top:0;left:0;right:0;height:44px;background:var(--pn);border-bottom:1px solid var(--b2);display:flex;align-items:stretch;z-index:1000;overflow:hidden}
.tbs{display:flex;flex-direction:column;justify-content:center;padding:0 10px;border-right:1px solid var(--b1);min-width:66px;flex-shrink:0}
.tbs.end{border-right:none;flex:1;flex-direction:row;align-items:center;justify-content:flex-end;gap:6px;padding-right:6px}
.tl{font-size:7px;color:var(--dm);letter-spacing:2px;margin-bottom:1px}
.tv{font-family:var(--hd);font-size:11px;color:var(--ac)}
.tv.lg{font-size:13px}
.wb{background:rgba(200,22,48,.14);border:1px solid rgba(200,22,48,.4);color:#ff6878;font-size:7px;padding:2px 7px;animation:wbp 2s ease-in-out infinite}
@keyframes wbp{0%,100%{opacity:1}50%{opacity:.5}}
/* SIDE PANEL */
#sp{position:fixed;left:0;top:44px;width:274px;height:calc(100vh - 44px);background:var(--pn);border-right:1px solid var(--b2);display:flex;flex-direction:column;z-index:900;transition:transform .25s ease}
#ph{padding:11px 12px;border-bottom:1px solid var(--b1);background:rgba(0,0,0,.28);flex-shrink:0;min-height:78px}
.po{font-size:7px;color:var(--dm);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px}
.pn{font-family:var(--hd);font-size:12px;color:#ddeeff;letter-spacing:1px;line-height:1.25;margin-bottom:4px}
.ptg{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:7px;letter-spacing:1.5px;padding:2px 6px;border:1px solid}
.to{color:#4ce870;border-color:#186030;background:rgba(76,232,112,.07)}
.tw{color:#ff4858;border-color:#681020;background:rgba(255,72,88,.07)}
.ta{color:#48a8ff;border-color:#184888;background:rgba(72,168,255,.07)}
.tn{color:var(--ac);border-color:var(--a3);background:var(--a2)}
.te{color:#ff2838;border-color:#781020;background:rgba(255,40,56,.1);animation:ep 1s ease-in-out infinite alternate}
.tf{color:var(--dm);border-color:#1e3040}
.th{color:#e8a040;border-color:#785020;background:rgba(232,160,64,.07)}
@keyframes ep{from{opacity:1}to{opacity:.4}}
#pb{flex:1;overflow-y:auto;padding:10px 11px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;-webkit-overflow-scrolling:touch}
#pb::-webkit-scrollbar{width:3px}
#pb::-webkit-scrollbar-thumb{background:var(--b2)}
/* PANEL CONTENT */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.sc{background:rgba(255,255,255,.03);border:1px solid var(--b1);padding:6px 8px}
.sl{font-size:7px;color:var(--dm);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.sv{font-family:var(--hd);font-size:15px;color:var(--tx)}
.sv.fog{color:var(--dm);font-size:10px;letter-spacing:4px}
.sd{font-size:7px;color:var(--dm);letter-spacing:2px;text-transform:uppercase;margin:9px 0 6px;display:flex;align-items:center;gap:6px}
.sd::after{content:'';flex:1;height:1px;background:var(--b1)}
.cw{text-align:center;margin:4px 0 10px}
.cwn{font-family:var(--hd);font-size:22px;color:var(--ac)}
.cws{font-size:7px;color:var(--dm);letter-spacing:2px;margin-top:1px}
.bg3{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:5px}
.bg2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px}
.btn{background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--dm);padding:6px 2px;cursor:pointer;font-family:var(--fn);font-size:7.5px;text-align:center;line-height:1.6;transition:.15s}
.btn:hover,.btn.on{border-color:var(--ac);color:var(--tx);background:var(--a2)}
.btn.on{color:var(--ac)}
.ab{width:100%;background:rgba(20,40,60,.5);border:1px solid var(--b2);color:var(--tx);padding:8px;cursor:pointer;font-family:var(--fn);font-size:8px;margin-bottom:4px;transition:.15s;text-align:left}
.ab:hover,.ab:active{background:var(--a2);border-color:var(--ac);color:var(--ac)}
.ab.r{color:#ff7080;border-color:#481020;background:rgba(200,22,48,.08)}
.ab.r:hover,.ab.r:active{background:rgba(200,22,48,.2);border-color:#c81630}
.ab.p{animation:ap .7s ease-in-out infinite alternate}
@keyframes ap{from{background:rgba(200,22,48,.08)}to{background:rgba(200,22,48,.28);border-color:#c81630}}
.db{background:rgba(24,72,176,.1);border:1px solid rgba(24,72,176,.3);color:#6898e0;padding:7px 3px;cursor:pointer;font-family:var(--fn);font-size:7.5px;text-align:center;line-height:1.6;transition:.15s}
.db:hover,.db:active{background:rgba(24,72,176,.2);border-color:#4878d0;color:#a0c8ff}
.db:disabled{opacity:.2;cursor:not-allowed}
.db.war{color:#ff6070;border-color:rgba(180,20,40,.4);background:rgba(180,20,40,.08)}
.db.war:hover,.db.war:active{background:rgba(180,20,40,.2);border-color:#c81630}
.db.full{grid-column:span 2;background:var(--a2);border-color:var(--a3);color:var(--ac)}
/* MAP VIEWPORT — KEY FIX: SVG must NOT stretch */
#vp{position:fixed;left:274px;top:44px;right:0;bottom:74px;overflow:hidden;cursor:grab;background:#02080e;touch-action:none}
#vp.drag{cursor:grabbing}
/* #mi is the pan/zoom container; transform-origin MUST be 0 0 */
#mi{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
/* #svgh holds the raw SVG; width/height controlled by JS after viewBox read */
#svgh{display:block;line-height:0;font-size:0}
/* SVG element: preserve aspect ratio, never stretch */
#svgh svg{display:block;width:100%;height:auto;max-width:none;
  /* preserveAspectRatio set via JS setAttribute in processSVG */}
.tl2{cursor:pointer;transition:filter .1s}
.tl2:hover{filter:brightness(1.45) drop-shadow(0 0 4px rgba(200,162,72,.4))!important}
.sel{stroke:#c8a248!important;stroke-width:2.5!important;filter:drop-shadow(0 0 9px rgba(200,162,72,.85)) brightness(1.2)!important;vector-effect:non-scaling-stroke!important}
.ha{stroke:#ff3050!important;stroke-width:2.2!important;vector-effect:non-scaling-stroke!important;animation:hlp .75s ease-in-out infinite alternate!important;cursor:crosshair!important}
@keyframes hlp{from{filter:brightness(1.1)}to{filter:brightness(1.65) drop-shadow(0 0 8px #ff3050)}}
.hm{stroke:#28c8ff!important;stroke-width:1.5!important;vector-effect:non-scaling-stroke!important;cursor:crosshair!important}
.enc{stroke:#ff0820!important;stroke-width:1.8!important;vector-effect:non-scaling-stroke!important;animation:enct 1.2s ease-in-out infinite alternate!important}
@keyframes enct{from{filter:none}to{filter:drop-shadow(0 0 8px #ff0020)}}
.fh2{filter:grayscale(90%) brightness(.22)!important}
.fs2{filter:grayscale(20%) brightness(.58)!important}
/* TROOP TOWER - inside #mi, so transforms with map */
#troop-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500;overflow:visible}
.troop-tower{position:absolute;display:flex;flex-direction:column;gap:1px;align-items:center;pointer-events:none;user-select:none;transform-origin:center center}
.tb-badge{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.18);padding:1px 3px;border-radius:2px;white-space:nowrap;line-height:1}
.tb-badge.inf{border-color:rgba(100,220,120,.5)}
.tb-badge.tnk{border-color:rgba(240,180,60,.5)}
.tb-badge.art{border-color:rgba(100,160,240,.5)}
.tb-icon{font-size:8px;line-height:1}
.tb-num{font-family:var(--hd);font-size:7px;font-weight:700;color:#fff;text-shadow:0 0 3px #000}
.tb-badge.inf .tb-num{color:#78ee98}
.tb-badge.tnk .tb-num{color:#f0c050}
.tb-badge.art .tb-num{color:#78b8f0}
/* LOG */
#log{position:fixed;left:274px;right:0;bottom:0;height:74px;background:rgba(5,10,14,.97);border-top:1px solid var(--b1);padding:5px 12px;z-index:800}
#lhdr{font-size:7px;color:var(--dm);letter-spacing:2px;margin-bottom:3px}
#llist{height:50px;overflow:hidden;display:flex;flex-direction:column-reverse;gap:1px}
.le{font-size:8px;color:var(--dm);padding-left:9px;position:relative;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.le::before{content:'>';position:absolute;left:0;color:var(--a3)}
.lw{color:#e06070}.lk{color:#68e888}.li{color:#68a8e8}.lt{color:var(--ac)}.lai{color:#b09038}
/* NEXT TURN */
#nxt{position:fixed;right:14px;bottom:86px;background:#480a14;border:1px solid #681820;color:#fff;padding:9px 20px;font-family:var(--hd);font-size:9px;letter-spacing:2px;cursor:pointer;z-index:1000;transition:.2s}
#nxt:hover,#nxt:active{background:#6a1020;border-color:#c81630;box-shadow:0 0 16px rgba(200,22,48,.5)}
/* MODE INDICATOR */
#mind{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:88px;background:rgba(200,22,48,.92);border:1px solid #c81630;color:#fff;padding:5px 16px;font-size:8px;letter-spacing:2px;z-index:1100;pointer-events:none;animation:mp .7s ease-in-out infinite alternate;white-space:nowrap}
@keyframes mp{from{box-shadow:0 0 8px rgba(200,22,48,.3)}to{box-shadow:0 0 20px rgba(200,22,48,.8)}}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center}
#modal.open{display:flex}
#mbox{background:#080f1a;border:1px solid var(--b2);width:480px;max-width:94vw;max-height:90vh;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;-webkit-overflow-scrolling:touch}
.mt{font-family:var(--hd);font-size:12px;color:var(--ac);letter-spacing:2px;margin-bottom:2px}
.ms{font-size:8px;color:var(--dm);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--b1)}
.mi{font-size:8.5px;color:#b0c8e0;padding:8px;border:1px solid var(--b1);margin:8px 0;line-height:1.9}
.mr{display:none;margin:8px 0;padding:8px;font-size:8.5px;line-height:1.8;border:1px solid}
.mr.ok{color:#70e890;border-color:#186028;background:rgba(70,200,80,.06)}
.mr.no{color:#ff7080;border-color:#581018;background:rgba(255,80,96,.06)}
.mr.inf{color:#78b8e8;border-color:#183868;background:rgba(80,120,200,.06)}
.mbtns{display:flex;gap:6px;margin-top:12px}
.mb{flex:1;padding:8px;font-family:var(--fn);font-size:8px;cursor:pointer;border:1px solid;transition:.15s;letter-spacing:1px}
.mb.ok{background:var(--a2);border-color:var(--a3);color:var(--ac)}
.mb.ok:hover,.mb.ok:active{background:rgba(200,162,72,.22);border-color:var(--ac)}
.mb.cl{background:rgba(255,255,255,.03);border-color:var(--b1);color:var(--dm)}
.mb.cl:hover,.mb.cl:active{background:rgba(255,255,255,.07)}
.mb.ng{background:rgba(200,22,48,.1);border-color:rgba(200,22,48,.3);color:#ff8090}
.sr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.sl2{font-size:8px;color:var(--dm);min-width:66px}
.sr input[type=range]{flex:1;accent-color:var(--ac);height:3px}
.sv2{min-width:28px;text-align:right;color:var(--ac);font-family:var(--hd);font-size:11px}
.mchk{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:9px;cursor:pointer}
.mchk input{accent-color:var(--ac);width:12px;height:12px}
.mc2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mch{font-size:7px;color:var(--dm);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--b1)}
.mdi{font-size:8.5px;color:#b0c8e0;padding:4px 0;border-bottom:1px solid var(--b1)}
.mdi:last-child{border-bottom:none}
.tsel{background:var(--pn);border:1px solid var(--b2);color:var(--tx);font-family:var(--fn);font-size:8.5px;padding:4px 7px;width:100%;margin-bottom:6px;cursor:pointer}
/* MOBILE TOGGLE */
#sp-tog{display:none;position:fixed;bottom:84px;left:8px;z-index:950;background:var(--pn);border:1px solid var(--b2);color:var(--ac);font-family:var(--hd);font-size:8px;padding:6px 10px;cursor:pointer;letter-spacing:1px}

/* ═══════════════════════════════════════════
   MOBILE  @media max-width:768px
═══════════════════════════════════════════ */
@media(max-width:768px){
  #tb{height:40px;overflow-x:auto;overflow-y:hidden;flex-wrap:nowrap}
  #tb::-webkit-scrollbar{display:none}
  .tbs{min-width:54px;padding:0 6px}
  .tbs.end{flex-shrink:0;padding-right:4px;gap:3px;min-width:auto}
  .tv.lg{font-size:10px}.tv{font-size:10px}.tl{font-size:6px;letter-spacing:1px}
  .wb{font-size:6px;padding:2px 5px}
  #sp{left:0;right:0;top:auto;bottom:0;width:100%;height:42vh;max-height:42vh;
      border-right:none;border-top:2px solid var(--b2);
      transform:translateY(calc(100% - 42px));
      transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:920;
      border-radius:10px 10px 0 0}
  #sp.open{transform:translateY(0)}
  #ph{padding:6px 12px 5px;min-height:42px;cursor:pointer;position:relative;
      display:flex;flex-direction:column;justify-content:center}
  #ph::before{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%);
      width:36px;height:3px;background:var(--b2);border-radius:2px}
  .po{font-size:6px;margin-bottom:0;margin-top:4px}
  .pn{font-size:10px;margin-bottom:2px;line-height:1.2}
  #pb{padding:6px 10px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
  #vp{left:0;top:40px;right:0;bottom:0}
  #log{display:none}
  #nxt{right:8px;bottom:auto;top:48px;padding:8px 14px;font-size:8px;letter-spacing:1px;z-index:930}
  #mind{bottom:auto;top:48px;left:8px;right:auto;transform:none;font-size:7px;padding:4px 10px;
        max-width:calc(100vw - 100px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #sp-tog{display:flex;align-items:center;gap:4px;bottom:auto;top:48px;left:50%;
          transform:translateX(-50%);z-index:925;white-space:nowrap;padding:5px 10px}
  .sg{gap:3px;margin-bottom:5px}.sc{padding:4px 6px}.sv{font-size:12px}
  .cw{margin:2px 0 6px}.cwn{font-size:18px}.cws{font-size:6px}
  .bg3{gap:3px;margin-bottom:3px}.bg2{gap:3px;margin-bottom:3px}
  .btn{padding:5px 2px;font-size:7px;line-height:1.4}
  .ab{padding:7px 8px;font-size:8px;margin-bottom:3px}
  .db{padding:6px 2px;font-size:7px;line-height:1.4}.sd{margin:5px 0 4px;font-size:6px}
  .fgrid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px}
  .fh-t{font-size:15px}.ftab{font-size:7px;padding:4px 8px}
  #mbox{padding:14px;max-height:85vh}.mt{font-size:10px}.ms{font-size:7px;margin-bottom:8px}
  .mi{font-size:7.5px;padding:6px;margin:5px 0}.mb{padding:9px 6px;font-size:8px}
  .mbtns{gap:5px;margin-top:8px}.sr{gap:4px}.sl2{min-width:54px;font-size:7px}
  .tb-badge{padding:1px 2px}.tb-num{font-size:6px}.tb-icon{font-size:7px}
}
/* MOB LOG - shown inside bottom sheet on mobile */
#mob-log{display:none;border-top:1px solid var(--b1);background:rgba(0,0,0,.35);
  flex-shrink:0;padding:5px 10px 6px;height:96px;flex-direction:column}
.mob-lhdr{font-size:6px;color:var(--dm);letter-spacing:2px;margin-bottom:3px;flex-shrink:0}
#mob-llist{flex:1;max-height:72px;overflow-y:auto;display:flex;flex-direction:column;gap:1px;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
@media(max-width:768px){
  #mob-log{display:flex}
  #sp{flex-direction:column}
  #pb{flex:1 1 auto;min-height:0;overflow-y:auto;max-height:calc(42vh - 42px - 96px)}
}
@media(max-width:400px){
  #sp{height:48vh;max-height:48vh}
  #pb{max-height:calc(48vh - 42px - 96px)}
  .fgrid{grid-template-columns:1fr 1fr;gap:5px}
  .fh-t{font-size:13px;letter-spacing:2px}
}
</style>
</head>
<body>
<div id="ld">
  <div class="ld-t">WORLD COMMAND 1936</div>
  <div class="ld-b"><div class="ld-f" id="ldf"></div></div>
  <div class="ld-s" id="lds">読み込み中...</div>
  <div id="ld-err"></div>
</div>
<div id="fsel">
  <div class="fh">
    <div class="fh-t">WORLD COMMAND 1936</div>
    <div class="fh-s">— 国家を選択してください —</div>
    <div class="ftabs" id="ftabs"></div>
  </div>
  <div class="fbody"><div class="fgrid" id="fgrid"></div></div>

function cDef(u){return(u.i||0)*1.5+(u.t||0)*2.0+(u.a||0)*0.4}
function cPow(u){return Math.round(cAtk(u)+cDef(u))}
function incOf(f){
  var fac=FAC[f];
  var bonus=fac?fac.incBonus:0.8;
  var s=0;for(var id in S)if(S[id].own===f)s+=S[id].eco;
  return Math.max(1,Math.round(s*bonus*0.5));
}
function cntOf(f){var c=0;for(var id in S)if(S[id].own===f)c++;return c}
function adjOf(id){return ADJ[id]?Object.keys(ADJ[id]):[]}
function hashColor(s){
  var h=0;for(var i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;}
  var hue=Math.abs(h)%360;
  return 'hsl('+hue+',34%,30%)';
}
function fcol(f){
  if(FAC[f]&&FAC[f].c)return FAC[f].c;
  if(typeof f==='string'&&f.indexOf('nt_')===0)return hashColor(f.substring(3));
  return '#3c5c28';
}

function ecoFor(id,own){
  if(ECO_BASE[id])return ECO_BASE[id];
  // Apply low-value override for vast uninhabited Soviet territories
  if(own==='su'&&ECO_SU_LOW[id])return ECO_SU_LOW[id];
  // Overseas island territories
  var lowTags=['_Island','Island_','_Atoll','Nauru','Palau','Saipan','Wake','Midway','Guam'];
  for(var i=0;i<lowTags.length;i++)if(id.indexOf(lowTags[i])>=0)return 4+Math.floor(Math.random()*4);
  // Desert/tundra proxy
  var deserts=['Desert','Sahara','Tundra','Gobi','Rub_al','Alxa','Taklamakan'];
  for(var i=0;i<deserts.length;i++)if(id.indexOf(deserts[i])>=0)return 3+Math.floor(Math.random()*5);
  return 8+Math.floor(Math.random()*12);
}

// ── SVG Loading with cache-busting ──
var SKIP_RE=/^(pattern|diagonal|vertical|horizontal|crosshatch|checkers|texture|circles|raindrops|subtlepatch|wrapper|svg-|map-|legend|credit|sea|ocean|water|background|backdrop|frame|border|graticule|grid|outline|label|base|bg[-_]|clip|defs|gradient|layer|group|world|worldmap|mapoutline|text|title|desc|metadata|style|symbol|sphere|outline[-_]|land|coastline|lakes|rivers|grid[-_]|degrees|parallels|meridians)$/i;
// Also reject pure-numeric IDs (MapChart internal clip/defs)
var SKIP_PREFIX_RE=/^(clip|defs|gradient|pattern|filter|mask|symbol|use|g[-_]|layer[-_]|group[-_])/i;
// Only allow path/polygon shapes — never <rect>,<g>,<circle>,<ellipse>,<line>,<text> etc.
var ALLOWED_TAGS={path:1,polygon:1};
function loadSVG(){
  ldp(12,'SVGマップを取得中...');
  var bust='?v='+Date.now();
  var filenames=['MapChart_Map.svg'+bust,'MapChart_Map.svg.svg'+bust,
    './MapChart_Map.svg'+bust,'MapChart_Map.svg','MapChart_Map.svg.svg'];
  var idx=0;
  function tryNext(){
    if(idx>=filenames.length){
      showErr('SVGファイルが見つかりませんでした。\n確認事項:\n  1. index.html と MapChart_Map.svg が同じフォルダにあるか\n  2. GitHub Pages でデプロイされているか\n  3. ブラウザのコンソールでエラーを確認\n\n試したURL: '+filenames.join(', '));
      return;
    }
    var fname=filenames[idx++];
    var xhr=new XMLHttpRequest();
    xhr.open('GET',fname,true);xhr.timeout=20000;
    xhr.onload=function(){
      if((xhr.status===200||xhr.status===0)&&xhr.responseText&&xhr.responseText.length>500){
        ldp(30,'SVG取得完了 — 解析中...');processSVG(xhr.responseText);
      }else{tryNext();}
    };
    xhr.onerror=function(){tryNext();};
    xhr.ontimeout=function(){tryNext();};
    try{xhr.send();}catch(e){tryNext();}
  }
  tryNext();
}
// ── SVG Processing: KEY FIX – preserveAspectRatio & correct sizing ──
function processSVG(txt){
  ldp(40,'SVG解析中...');
  var host=document.getElementById('svgh');
  if(!host){showErr('内部エラー: #svgh が見つかりません');return;}
  try{host.innerHTML=txt;}catch(e){showErr('SVG注入エラー: '+e.message);return;}
  var svgEl=host.querySelector('svg');
  if(!svgEl){showErr('SVGタグが見つかりません');return;}

  // ── ASPECT RATIO FIX ──
  // 1) Read or set viewBox
  var vb=svgEl.getAttribute('viewBox');
  if(!vb){
    // Fallback: use explicit width/height attrs if present
    var w=parseFloat(svgEl.getAttribute('width')||'960');
    var h=parseFloat(svgEl.getAttribute('height')||'500');
    svgEl.setAttribute('viewBox','0 0 '+w+' '+h);
  }
  // 2) Force correct aspect-ratio preserving attribute
  svgEl.setAttribute('preserveAspectRatio','xMidYMid meet');
  // 3) Remove inline width/height so CSS controls it
  svgEl.removeAttribute('width');
  svgEl.removeAttribute('height');
  // 4) Size #mi container to match SVG natural aspect ratio
  var vbParts=(svgEl.getAttribute('viewBox')||'0 0 960 500').split(/[\s,]+/);
  var svgW=parseFloat(vbParts[2])||960;
  var svgH=parseFloat(vbParts[3])||500;
  var vp=document.getElementById('vp');
  var vpW=vp?vp.clientWidth:window.innerWidth;
  var vpH=vp?vp.clientHeight:window.innerHeight;
  // Fit entire map inside viewport preserving aspect ratio
  var fitScale=Math.min(vpW/svgW,vpH/svgH);
  var naturalW=svgW;var naturalH=svgH;
  // Set SVG to its natural pixel size; JS transform will handle zoom/pan
  svgEl.style.cssText='display:block;width:'+naturalW+'px;height:'+naturalH+'px;';
  var mi=document.getElementById('mi');
  if(mi){mi.style.width=naturalW+'px';mi.style.height=naturalH+'px';}
  // Initial camera: fit-to-screen centered
  _camZ=fitScale*0.95;
  _camX=(vpW-naturalW*_camZ)/2;
  _camY=(vpH-naturalH*_camZ)/2;

  S={};
  var allEls=svgEl.querySelectorAll('[id]');var count=0;var skipped=0;
  for(var i=0;i<allEls.length;i++){
    var el=allEls[i];var id=el.getAttribute('id');
    // ── STRICT VALIDATION: only real territory shapes survive ──
    if(!id){skipped++;continue;}
    var tag=el.tagName?el.tagName.toLowerCase():'';
    // 1) Must be a path/polygon — never a <rect>,<g>,<clipPath>,<defs> etc.
    if(!ALLOWED_TAGS[tag]){skipped++;continue;}
    // 2) Reject pure-numeric IDs (MapChart internal elements like "1273","4435")
    if(/^\d+$/.test(id)){skipped++;continue;}
    // 3) Reject by exact blacklist match (sea/ocean/background/etc.)
    if(SKIP_RE.test(id)){skipped++;continue;}
    // 4) Reject by prefix (clip0, defs1, gradient2, layer-1, group_3...)
    if(SKIP_PREFIX_RE.test(id)){skipped++;continue;}
    // 4) (getBBox check removed — runs before render, returns 0 for everything)
    // 5) Reject elements explicitly marked non-territory via data attribute
    if(el.getAttribute('data-skip')==='1'){skipped++;continue;}

    var own=TF[id]||('nt_'+id);
    el.setAttribute('fill',fcol(own));
    el.setAttribute('stroke-width','0.5');
    el.style.pointerEvents='visiblePainted';
    el.style.cursor='pointer';
    el.classList.add('tl2');
    (function(tid){
      el.addEventListener('click',function(e){e.stopPropagation();onClick(tid);});
    }(id));
    S[id]={el:el,name:id.replace(/_/g,' '),own:own,eco:ecoFor(id,own),u:mkU(own)};
    count++;
  }
  console.log('[WARCMD] territories registered:',count,'| skipped (non-territory):',skipped);
  if(count<10){showErr('地域データ不足 ('+count+'個) — SVG構造を確認してください');return;}
  ldp(55,'レイアウト待機中...');
  // Apply initial transform BEFORE buildAdj so getBoundingClientRect is correct
  applyTrans();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      ldp(60,'隣接関係を計算中...');
      buildAdjChunked(Object.keys(S),function(){
        ldp(88,'霧・視界を適用中...');
        try{applyFoW();}catch(e){console.warn('FoW error:',e);}
        ldp(95,'初期化完了...');
        updTB();updPanel(null);setupCtrl();
        var ld=document.getElementById('ld');if(ld)ld.classList.remove('on');
        addLog('1936年1月 — '+FAC[player].n+'として世界大戦略を開始。','lt');
        addLog('自国領土クリック→攻勢命令→赤域クリックで攻撃','li');
        addLog('包囲(ENCIRCLED)状態の敵は防御力-50%。','li');
        updTroopLabels();
      });
    });
  });
}
// ── Chunked Adjacency (BoundingClientRect cache) ──
function buildAdjChunked(ids,onDone){
  // Cache ALL rects first (single reflow)
  var rects={};
  for(var i=0;i<ids.length;i++){
    var el=S[ids[i]]&&S[ids[i]].el;
    if(el)rects[ids[i]]=el.getBoundingClientRect();
  }
  ADJ={};
  var PAD=3,row=0,CHUNK=60;
  function processChunk(){
    var end=Math.min(row+CHUNK,ids.length);
    for(var i=row;i<end;i++){
      var a=ids[i],ra=rects[a];
      if(!ra||ra.width<1)continue;
      if(!ADJ[a])ADJ[a]={};
      for(var j=i+1;j<ids.length;j++){
        var b=ids[j],rb=rects[b];
        if(!rb||rb.width<1)continue;
        if(!(ra.right<rb.left-PAD||ra.left>rb.right+PAD||
             ra.bottom<rb.top-PAD||ra.top>rb.bottom+PAD)){
          if(!ADJ[b])ADJ[b]={};ADJ[a][b]=1;ADJ[b][a]=1;
        }
      }
    }
    row=end;
    ldp(60+Math.round((row/ids.length)*25),'隣接計算中... ('+row+'/'+ids.length+')');
    if(row<ids.length)setTimeout(processChunk,0);
    else{
      // ── Pacific Wrap: connect East Asia ↔ North America ──────────────
      var PLINKS=[
        // Kamchatka/Chukotka ↔ Alaska
        ['Kamchatka','Alaska'],['Chukotka','Alaska'],
        ['Chukchi_Peninsula','Alaska'],
        // Japan ↔ Aleutians/Alaska
        ['Hokkaido','Alaska'],['Kuril_Islands','Alaska'],
        // Pacific island chains
        ['Hawaii','Midway_Island'],['Midway_Island','Wake_Island'],
        ['Wake_Island','Guam'],['Guam','Saipan'],
        ['Saipan','Wake_Island'],
        ['Marshall_Islands','Hawaii'],
        ['Caroline_Islands','Guam'],['Caroline_Islands','Saipan'],
        ['Palau','Caroline_Islands'],
        // Marcus → Saipan/Japan
        ['Marcus_Island','Saipan'],
        // Kuril → Hokkaido (already may exist from BBox but force it)
        ['Kuril_Islands','Hokkaido'],
        // Iwo Jima chain
        ['Iwo_Jima','Saipan'],['Iwo_Jima','Marcus_Island'],
        // Attu (westernmost Aleutian) ↔ Japan/Kamchatka
        ['Attu_Island','Kamchatka'],['Attu_Island','Hokkaido'],
        // Canada Pacific ↔ Japan via Aleutians
        ['Upper_British_Columbia','Alaska'],
        ['Alaska','Hokkaido'],['Alaska','Kamchatka']
      ];
      PLINKS.forEach(function(p){
        var a=p[0],b=p[1];
        if(!S[a]||!S[b])return;
        if(!ADJ[a])ADJ[a]={};if(!ADJ[b])ADJ[b]={};
        ADJ[a][b]=1;ADJ[b][a]=1;
      });
      var edges=0;for(var id in ADJ)edges+=Object.keys(ADJ[id]).length;
      console.log('[WARCMD] adj edges (incl Pacific wrap):',edges/2);
      onDone();
    }
  }
  processChunk();
}
// ── Fog of War ──
function getVis(){
  var vis={};
  for(var id in S){var t=S[id];if(t.own===player||isAlly(player,t.own))vis[id]=1;}
  for(var id in vis){var nbrs=adjOf(id);for(var i=0;i<nbrs.length;i++)vis[nbrs[i]]=1;}
  return vis;
}
function applyFoW(){
  var vis=getVis();
  for(var id in S){
    var t=S[id];if(!t.el)continue;
    t.el.classList.remove('fh2','fs2','enc');
    if(t.own===player){}
    else if(vis[id]){t.el.classList.add('fs2');if(isEnc(id))t.el.classList.add('enc');}
    else t.el.classList.add('fh2');
  }
}
function isEnc(id){
  var t=S[id];if(!t)return false;
  var nbrs=adjOf(id);if(!nbrs.length)return false;
  for(var i=0;i<nbrs.length;i++){
    var a=S[nbrs[i]];
    if(!a)continue;
    if(a.own===t.own||isAlly(t.own,a.own))return false;
  }
  return true;
}
// ── BFS reach ──
function reach(fromId,maxR){
  var vis={};vis[fromId]=0;var q=[[fromId,0]];
  var atk={},mov={};mov[fromId]=1;
  while(q.length){
    var pair=q.shift();var id=pair[0];var d=pair[1];
    if(d>=maxR)continue;
    var nbrs=adjOf(id);
    for(var i=0;i<nbrs.length;i++){
      var nId=nbrs[i];if(vis[nId]!==undefined)continue;
      var nt=S[nId];if(!nt)continue;
      vis[nId]=d+1;
      if(nt.own===player||isAlly(player,nt.own)){mov[nId]=1;q.push([nId,d+1]);}
      else atk[nId]=1;
    }
  }
  return{atk:atk,mov:mov};
}
function bombTgts(fromId){
  var tgts={};var nbrs=adjOf(fromId);
  for(var i=0;i<nbrs.length;i++){
    var a=S[nbrs[i]];
    if(a&&a.own!==player&&!isAlly(player,a.own))tgts[nbrs[i]]=1;
  }
  return tgts;
}

  if(isOwn){
    h+='<div class="sd">RECRUIT / 徴兵</div>'+
      '<div class="bg3">'+
      '<button class="btn'+(curUnit==='i'?' on':'')+'" onclick="G.setU(\'i\')">[I] 歩兵<br><span style="color:var(--ac)">Y10x10</span><br><span style="font-size:6.5px">Rng:2</span></button>'+
      '<button class="btn'+(curUnit==='t'?' on':'')+'" onclick="G.setU(\'t\')">[T] 戦車<br><span style="color:var(--ac)">Y50x2</span><br><span style="font-size:6.5px">Rng:3</span></button>'+
      '<button class="btn'+(curUnit==='a'?' on':'')+'" onclick="G.setU(\'a\')">[A] 砲兵<br><span style="color:var(--ac)">Y30x3</span><br><span style="font-size:6.5px">Rng:1</span></button>'+
      '</div>'+
      '<button class="ab" onclick="G.recruit()">+ 部隊を生産・招集</button>'+
      '<div class="sd">ORDERS / 命令</div>'+
      '<button class="ab r'+(atkMode==='assault'&&atkFrom===id?' p':'')+'" onclick="G.setAtk(\'assault\',\''+id+'\')">[ASSAULT] 歩兵突撃 Rng:2</button>'+
      '<button class="ab r'+(atkMode==='tankrush'&&atkFrom===id?' p':'')+'" onclick="G.setAtk(\'tankrush\',\''+id+'\')">[TANK RUSH] 機甲突破 Rng:3</button>'+
      '<button class="ab r'+(atkMode==='bombard'&&atkFrom===id?' p':'')+'" onclick="G.setAtk(\'bombard\',\''+id+'\')">[BOMBARD] 砲兵遠撃 Rng:1</button>'+
      '<button class="ab'+(atkMode==='move'&&atkFrom===id?' p':'')+'" onclick="G.setAtk(\'move\',\''+id+'\')">[MOVE] 部隊移動 Rng:2</button>'+
      (atkMode?'<button class="ab" onclick="G.cancelAtk()">[CANCEL] キャンセル</button>':'');
  }else{
    h+='<div class="sd">DIPLOMACY</div><div class="bg2">';
    if(r!=='war'){
      h+='<button class="db" onclick="G.opD(\'alliance\',\''+id+'\')">同盟<br>ALLIANCE</button>'+
         '<button class="db" onclick="G.opD(\'aid\',\''+id+'\')">援助<br>AID</button>'+
         '<button class="db" onclick="G.opD(\'guarantee\',\''+id+'\')">独立保障<br>GUARANTEE</button>'+
         '<button class="db" onclick="G.opD(\'puppet\',\''+id+'\')">傀儡化<br>PUPPET</button>';
    }else{
      h+='<button class="db" disabled>同盟</button>'+
         '<button class="db" disabled>援助</button>'+
         '<button class="db war" onclick="G.opPeace(\''+id+'\')">講和<br>PEACE</button>'+
         '<button class="db" disabled>傀儡化</button>';
    }
    h+='<button class="db full" onclick="G.opNeg(\''+id+'\')">GIVE &amp; TAKE</button></div>';
    if(lastOwn&&S[lastOwn]&&S[lastOwn].own===player){
      var r2=reach(lastOwn,2),r3=reach(lastOwn,3);
      if(r2.atk[id]||r3.atk[id]){
        var m2=r2.atk[id]?'assault':'tankrush';
        h+='<div class="sd">QUICK ATTACK</div>'+
           '<button class="ab r" onclick="G.showAM(\''+lastOwn+'\',\''+id+'\',\''+m2+'\')">'+

// ── Recruit ──
var UC={i:{c:10,b:10},t:{c:50,b:2},a:{c:30,b:3}};
function setU(u){curUnit=u;if(sel)updPanel(sel);}
function recruit(){
  var id=sel;if(!id||!S[id]||S[id].own!==player)return;
  var u=UC[curUnit],cost=u.c*u.b;
  if(money<cost){addLog('資金不足: Y'+cost+'必要','lw');return;}
  money-=cost;S[id].u[curUnit]=(S[id].u[curUnit]||0)+u.b;
  addLog(S[id].name+': '+curUnit.toUpperCase()+'x'+u.b+'生産 (Y'+cost+')','lk');
  updTB();updPanel(id);updTroopLabels();
}
// ── Attack Mode ──
function setAtk(mode,id){
  var fid=id||sel||lastOwn;
  if(!fid||!S[fid]||S[fid].own!==player)return;
  atkMode=mode;atkFrom=fid;
  var atkSet,movSet;
  if(mode==='bombard'){atkSet=bombTgts(fid);movSet={};}
  else if(mode==='move'){
    var res=reach(fid,2);atkSet={};movSet={};
    for(var mid in res.mov)if(mid!==fid)movSet[mid]=1;
  }else{
    var res2=reach(fid,mode==='tankrush'?3:2);
    atkSet=res2.atk;movSet=res2.mov;
  }
  applyHL(atkSet,movSet);
  var mi=document.getElementById('mind');
  if(mi){mi.style.display='block';mi.textContent=mode.toUpperCase()+' — ['+S[fid].name+'] から目標選択';}
  if(sel)updPanel(sel);
}
function cancelAtk(){
  atkMode=null;atkFrom=null;clearHL();
  var mi=document.getElementById('mind');if(mi)mi.style.display='none';
  if(sel)updPanel(sel);
}
// ── Move ──
function execMove(fid,tid){
  var at=S[fid],dt=S[tid];if(!at||!dt)return;
  if(dt.own!==player&&!isAlly(player,dt.own)){addLog('自軍か同盟国のみ移動可','lw');return;}
  var p=sendPct/100;
  var si=Math.max(0,Math.floor((at.u.i||0)*p));
  var st=Math.max(0,Math.floor((at.u.t||0)*p));
  var sa=Math.max(0,Math.floor((at.u.a||0)*p));
  at.u.i=Math.max(0,(at.u.i||0)-si);at.u.t=Math.max(0,(at.u.t||0)-st);at.u.a=Math.max(0,(at.u.a||0)-sa);
  dt.u.i=(dt.u.i||0)+si;dt.u.t=(dt.u.t||0)+st;dt.u.a=(dt.u.a||0)+sa;
  addLog('[移動] '+at.name+' → '+dt.name+' [I]'+si+' [T]'+st+' [A]'+sa,'lt');
  cancelAtk();updTB();updPanel(sel);updTroopLabels();
}
// ── Attack Modal ──
function showAM(fid,tid,mode){
  _af=fid;_at=tid;_am=mode;sendPct=50;
  var at=S[fid],df=S[tid];if(!at||!df)return;
  var vis=getVis();var enc=isEnc(tid);var dk=!!vis[tid];
  document.getElementById('m-t').textContent='攻撃確認 — ATTACK ORDER';
  document.getElementById('m-s').textContent=at.name+' → '+df.name+' | '+mode.toUpperCase();

  document.getElementById('m-b').innerHTML=
    '<div class="mi">攻撃元: <b>'+at.name+'</b><br>目標: <b>'+df.name+'</b>'+(enc?'<br><span style="color:#ff4050">■ 包囲殲滅: 防御力-50%</span>':'')+'</div>'+
    '<div class="sd">SEND FORCES / 派遣割合</div>'+
    '<div class="sr"><span class="sl2">派遣割合</span>'+
      '<input type="range" min="10" max="90" step="10" value="50" id="sl-s" oninput="G._slS(this.value)">'+
      '<span class="sv2" id="sv-s">50%</span></div>'+

}
function _slS(v){sendPct=+v;var s=document.getElementById('sv-s');if(s)s.textContent=v+'%';updAP();}
function updAP(){
  var at=S[_af];if(!at)return;
  var p=sendPct/100;
  var si=Math.max(1,Math.floor((at.u.i||0)*p));
  var st=Math.max(0,Math.floor((at.u.t||0)*p));
  var sa=Math.max(0,Math.floor((at.u.a||0)*p));
  var ap=(_am==='tankrush'?st*3.2+si*0.3:si*1.0+st*3.2)+sa*0.5;
  var el=document.getElementById('ap2');
  if(el)el.innerHTML='派遣: [I]'+si+' [T]'+st+' [A]'+sa+' | 攻撃力: <span style="color:var(--ac);font-family:var(--hd)">'+Math.round(ap)+'</span>';
}
function execAM(){closeModal();cancelAtk();execAtk(_af,_at,_am);}
// ── Combat ──
function execAtk(fid,tid,mode){
  var at=S[fid],df=S[tid];
  if(!at||!df||at.own!==player||df.own===player)return;
  var modeR=mode==='tankrush'?3:2;
  var res=reach(fid,modeR);
  if(!res.atk[tid]){addLog(df.name+'は射程外','lw');return;}
  if(!isWar(player,df.own)){
    setRel(player,df.own,'war');
    wCaps[rk(player,df.own)]=wCaps[rk(player,df.own)]||[];
    addLog('[宣戦布告] '+(FAC[player]&&FAC[player].sn)+' → '+((FAC[df.own]&&FAC[df.own].sn)||df.own.replace('nt_','')),'lw');
  }
  var p=sendPct/100;
  var si=Math.max(1,Math.floor((at.u.i||0)*p));
  var st=Math.max(0,Math.floor((at.u.t||0)*p));
  var sa=Math.max(0,Math.floor((at.u.a||0)*p));
  var ap=(mode==='tankrush'?st*3.2+si*0.3:si*1.0+st*3.2)+sa*0.5;
  ap*=(0.75+Math.random()*0.5);
  var enc=isEnc(tid);
  var dp=cDef(df.u)*(enc?0.5:1.0)*(0.75+Math.random()*0.5);
  if(enc)addLog('[包囲殲滅] '+df.name+': 防御力-50%','lt');
  at.u.i=Math.max(0,(at.u.i||0)-Math.floor(dp*0.14));
  at.u.t=Math.max(0,(at.u.t||0)-Math.floor(dp*0.05));
  if(ap>dp){
    var prev=df.own;df.own=player;df.u={i:si,t:st,a:sa};
    at.u.i=Math.max(0,(at.u.i||0)-si);at.u.t=Math.max(0,(at.u.t||0)-st);
    df.el.setAttribute('fill',fcol(player));df.el.classList.remove('fh2','fs2','enc');
    var wk=rk(player,prev);(wCaps[wk]=wCaps[wk]||[]).push({id:tid,prev:prev});
    addLog('[占領] '+df.name+'を占領！ ATK:'+Math.round(ap)+' vs DEF:'+Math.round(dp),'lk');
    var rem=0;for(var id in S)if(S[id].own===prev)rem++;
    if(rem===0)addLog('[降伏] '+((FAC[prev]&&FAC[prev].n)||prev.replace('nt_',''))+'が降伏！','lk');
  }else{
    df.u.i=Math.max(0,(df.u.i||0)-Math.floor((df.u.i||0)*0.13));
    addLog('[失敗] '+df.name+'への攻撃失敗 ATK:'+Math.round(ap)+' vs DEF:'+Math.round(dp),'lw');
  }
  applyFoW();updTB();if(sel)updPanel(sel);updTroopLabels();
}
// ── Bombard ──
function execBomb(fid,tid){
  var at=S[fid],df=S[tid];if(!at||!df||at.own!==player)return;
  var nbrs=adjOf(fid);var ok=false;
  for(var i=0;i<nbrs.length;i++)if(nbrs[i]===tid){ok=true;break;}
  if(!ok){addLog('砲兵射程外（隣接のみ）','lw');return;}
  if(!(at.u.a>0)){addLog(at.name+'に砲兵がいません','lw');return;}
  var dmg=Math.max(1,Math.floor(at.u.a*2*(0.7+Math.random()*0.6)));
  df.u.i=Math.max(0,(df.u.i||0)-Math.floor(dmg*0.7));
  df.u.t=Math.max(0,(df.u.t||0)-Math.floor(dmg*0.2));
  at.u.a=Math.max(0,at.u.a-Math.floor(at.u.a*0.08));
  if(!isWar(player,df.own)){setRel(player,df.own,'war');wCaps[rk(player,df.own)]=[];addLog('[宣戦布告(砲撃)] '+df.name+' へ','lw');}
  addLog('[砲撃] '+df.name+' 損害 [I]-'+Math.floor(dmg*0.7)+' [T]-'+Math.floor(dmg*0.2),'lt');
  cancelAtk();applyFoW();updTB();if(sel)updPanel(sel);updTroopLabels();
}
// ── Diplomacy ──
function opD(type,tid){
  var f=S[tid]&&S[tid].own;if(!f)return;
  var fn=(FAC[f]&&FAC[f].n)||f;
  var mi2={
    alliance:'同盟条約 — '+fn+'と同盟を結ぶ (Y200)\n同盟国は互いの領土を守り合います。',
    aid:'経済援助 — '+fn+'に援助 (Y300)\n関係を改善し、友好度を上げます。',
    guarantee:'独立保障 — '+fn+'の独立を保障 (Y100)\n小国への影響力を増やします。',
    puppet:'傀儡化工作 — '+fn+'を属国化 (Y500)\n成功すれば領土と収入を間接支配できます。'
  };
  var mc={alliance:200,aid:300,guarantee:100,puppet:500};
  document.getElementById('m-t').textContent='DIPLOMACY — '+type.toUpperCase();
  document.getElementById('m-s').textContent=fn+' との外交交渉';
  document.getElementById('m-r').style.display='none';
  document.getElementById('m-b').innerHTML='<div class="mi">'+mi2[type]+'</div>'+
    '<div class="mi">現在の国庫: Y'+money+'<br>コスト: Y'+mc[type]+'</div>';
  document.getElementById('m-btns').innerHTML=
    '<button class="mb cl" onclick="G.closeModal()">CANCEL</button>'+
    '<button class="mb ok" onclick="G._execD(\''+type+'\',\''+f+'\')">EXECUTE</button>';
  document.getElementById('modal').classList.add('open');
}
function _execD(type,f){
  closeModal();
  var mc={alliance:200,aid:300,guarantee:100,puppet:500};var cost=mc[type];
  if(money<cost){addLog('資金不足: Y'+cost+'必要','lw');return;}
  var fn=(FAC[f]&&FAC[f].n)||f;var roll=Math.random();money-=cost;
  if(type==='alliance'){
    if(roll>0.35){setRel(player,f,'allied');addLog('[同盟成立] '+fn+'と同盟','lk');}
    else addLog('[同盟失敗] '+fn+'は拒否した','lw');
  }else if(type==='aid'){addLog('[援助] '+fn+'にY'+cost+'援助 — 関係改善','lt');}
  else if(type==='guarantee'){addLog('[保障] '+fn+'の独立を保障','lt');}
  else if(type==='puppet'){
    if(roll>0.6){
      for(var id in S)if(S[id].own===f){S[id].own=player;S[id].el.setAttribute('fill',fcol(player));}
      addLog('[傀儡化成功] '+fn+'を属国化！','lk');applyFoW();updTB();
    }else addLog('[傀儡化失敗] '+fn+'は拒否した','lw');
  }
  updTB();
}

// ── Negotiation ──
function opNeg(tid){
  var f=S[tid]&&S[tid].own;if(!f)return;
  var fn=(FAC[f]&&FAC[f].n)||f;
  var myIds=[],theirIds=[];
  for(var id in S){
    if(S[id].own===player)myIds.push(id);
    else if(S[id].own===f)theirIds.push(id);
  }
  var html='<div class="mi">'+fn+'との領土交渉</div>'+
    '<div class="mc2">'+
    '<div><div class="mch">提供（自国）</div>'+
    '<select class="tsel" id="neg-give" size="4" multiple style="height:80px">';
  myIds.slice(0,15).forEach(function(id){html+='<option value="'+id+'">'+S[id].name+'</option>';});
  html+='</select></div><div><div class="mch">要求（相手）</div>'+
    '<select class="tsel" id="neg-take" size="4" multiple style="height:80px">';
  theirIds.slice(0,15).forEach(function(id){html+='<option value="'+id+'">'+S[id].name+'</option>';});
  html+='</select></div></div>';
  document.getElementById('m-t').textContent='GIVE & TAKE';
  document.getElementById('m-s').textContent=fn+' との領土交渉';
  document.getElementById('m-b').innerHTML=html;
  document.getElementById('m-r').style.display='none';
  document.getElementById('m-btns').innerHTML=
    '<button class="mb cl" onclick="G.closeModal()">CANCEL</button>'+
    '<button class="mb ok" onclick="G._execNeg(\''+f+'\')">PROPOSE</button>';
  document.getElementById('modal').classList.add('open');
}
function _execNeg(f){
  closeModal();var fn=(FAC[f]&&FAC[f].n)||f;
  var giveEl=document.getElementById('neg-give'),takeEl=document.getElementById('neg-take');
  var give=[],take=[];
  if(giveEl)for(var i=0;i<giveEl.options.length;i++)if(giveEl.options[i].selected)give.push(giveEl.options[i].value);
  if(takeEl)for(var i=0;i<takeEl.options.length;i++)if(takeEl.options[i].selected)take.push(takeEl.options[i].value);
  var gn=give.length,tn=take.length;var chance=gn>=tn?0.65:0.35;
  if(Math.random()<chance){
    give.forEach(function(id){if(S[id]){S[id].own=f;S[id].el.setAttribute('fill',fcol(f));}});
    take.forEach(function(id){if(S[id]){S[id].own=player;S[id].el.setAttribute('fill',fcol(player));}});
    addLog('[交渉成立] '+fn+'との領土交換 (+'+tn+' -'+gn+')','lk');
    applyFoW();updTB();
  }else{addLog('[交渉決裂] '+fn+'は拒否した','lw');}
  updTroopLabels();
}
// ── TopBar ──
function updTB(){
  var m=document.getElementById('tb-m');if(m)m.textContent=money;
  var inc=incOf(player);
  var ti=document.getElementById('tb-i');if(ti){ti.textContent='+'+inc;ti.style.color=inc>0?'#68d888':'var(--dm)';}
  var tt=document.getElementById('tb-t');if(tt)tt.textContent=cntOf(player);
  var td=document.getElementById('tb-d');if(td)td.textContent=yr+'.'+(mo<10?'0':'')+mo;
  var tw2=document.getElementById('tb-w');
  if(tw2){
    var wars=[];
    for(var k in rel){if(rel[k]==='war'){var pts=k.split('-');if(pts[0]===player||pts[1]===player)wars.push(pts[0]===player?pts[1]:pts[0]);}}
    // Remove war status buttons before re-adding them
    var existBtns=tw2.querySelectorAll('.wb');existBtns.forEach(function(b){b.parentNode.removeChild(b);});
    wars.forEach(function(f){
      var wb=document.createElement('span');wb.className='wb';
      wb.textContent='WAR: '+((FAC[f]&&FAC[f].sn)||f.replace('nt_','').substring(0,4).toUpperCase());
      tw2.insertBefore(wb,tw2.firstChild);
    });
  }
}
// ── World Status ──
function showWorldStatus(){
  var facs={};
  for(var id in S){
    var own=S[id].own;
    if(!facs[own])facs[own]={cnt:0,eco:0,pow:0};
    facs[own].cnt++;facs[own].eco+=S[id].eco;facs[own].pow+=cPow(S[id].u);
  }
  var rows=Object.keys(facs).sort(function(a,b){return facs[b].cnt-facs[a].cnt;}).slice(0,14);
  var html='<div class="mch">WORLD SITUATION / 世界情勢</div>';
  rows.forEach(function(f){
    var fn=(FAC[f]&&FAC[f].n)||f.replace('nt_','');
    var r2=getRel(player,f);
    var rc=f===player?'#68e888':r2==='war'?'#ff7080':r2==='allied'?'#6898e0':'var(--dm)';
    html+='<div class="mdi" style="color:'+rc+'">'+fn+' — 領土:'+facs[f].cnt+' ECO:'+facs[f].eco+' POW:'+facs[f].pow+'</div>';
  });
  document.getElementById('m-t').textContent='WORLD SITUATION';
  document.getElementById('m-s').textContent='Turn '+turn+' | '+yr+'-'+(mo<10?'0':'')+mo;
  document.getElementById('m-b').innerHTML=html;
  document.getElementById('m-r').style.display='none';
  document.getElementById('m-btns').innerHTML='<button class="mb cl" onclick="G.closeModal()" style="flex:1">CLOSE</button>';
  document.getElementById('modal').classList.add('open');
}
function showDiplomStatus(){
  var html='<div class="mch">外交状況 / DIPLOMATIC STATUS</div>';
  var byRel={war:[],allied:[],hostile:[],peace:[]};
  Object.keys(FAC).forEach(function(f){
    if(f===player)return;
    var r2=getRel(player,f);if(!byRel[r2])byRel[r2]=[];byRel[r2].push(f);
  });
  function sect(title,arr,col){
    if(!arr.length)return'';
    var h='<div class="sd">'+title+'</div>';
    arr.forEach(function(f){h+='<div class="mdi" style="color:'+col+'">'+FAC[f].n+' ('+FAC[f].sn+')</div>';});
    return h;
  }
  html+=sect('■ AT WAR',byRel.war,'#ff7080');
  html+=sect('● ALLIED',byRel.allied,'#6898e0');
  html+=sect('▲ HOSTILE',byRel.hostile,'#e8a040');
  html+=sect('○ PEACE',byRel.peace,'var(--dm)');
  document.getElementById('m-t').textContent='DIPLOMATIC STATUS';
  document.getElementById('m-s').textContent=FAC[player].n;
  document.getElementById('m-b').innerHTML=html;
  document.getElementById('m-r').style.display='none';
  document.getElementById('m-btns').innerHTML='<button class="mb cl" onclick="G.closeModal()" style="flex:1">CLOSE</button>';
  document.getElementById('modal').classList.add('open');
}
// ── Troop Tower (HOI4-style) ─────────────────────────────────────
// Overlay is INSIDE #mi so towers follow pan/zoom automatically.
// We use getBBox() in SVG-space coordinates (not screen coords).
function updTroopLabels(){
  var ov=document.getElementById('troop-overlay');if(!ov)return;
  ov.innerHTML='';
  var svgEl=document.querySelector('#svgh svg');if(!svgEl)return;
  // Get the viewBox dimensions to map SVG-space → pixel-space
  var vbAttr=svgEl.getAttribute('viewBox')||'0 0 960 500';
  var vbParts=vbAttr.split(/[\s,]+/);
  var svgW=parseFloat(vbParts[2])||960;
  var svgH=parseFloat(vbParts[3])||500;
  // #svgh svg has fixed pixel size (set in processSVG): svgW x svgH
  // So SVG-space coords = pixel coords inside #mi directly
  var vis=getVis();
  var isMob=checkMobile();
  for(var id in S){
    var t=S[id];if(!t.el)continue;
    if(t.own!==player&&!vis[id])continue;
    var hasAny=(t.u.i||0)+(t.u.t||0)+(t.u.a||0);
    if(!hasAny)continue;
    // Use getBBox() to get center in SVG coordinate space
    var bbox;
    try{bbox=t.el.getBBox();}catch(e){continue;}
    if(!bbox||bbox.width<1)continue;
    var cx=bbox.x+bbox.width/2;
    var cy=bbox.y+bbox.height/2;
    // Clamp to SVG bounds
    if(cx<0||cy<0||cx>svgW||cy>svgH)continue;
    var tower=document.createElement('div');
    tower.className='troop-tower';
    // Position in SVG pixel coords (inside #mi which IS the SVG space)
    tower.style.left=cx+'px';
    tower.style.top=cy+'px';
    // Scale badge slightly based on zoom for readability
    var bs=Math.max(0.7,Math.min(1.4,1/_camZ));
    tower.style.transform='translate(-50%,-50%) scale('+bs+')';
    if(t.u.i>0){
      var b=document.createElement('div');b.className='tb-badge inf';
      b.innerHTML='<span class="tb-icon">🪖</span><span class="tb-num">'+t.u.i+'</span>';
      tower.appendChild(b);
    }
    if(t.u.t>0){
      var b2=document.createElement('div');b2.className='tb-badge tnk';
      b2.innerHTML='<span class="tb-icon">🚜</span><span class="tb-num">'+t.u.t+'</span>';
      tower.appendChild(b2);
    }
    if(t.u.a>0){
      var b3=document.createElement('div');b3.className='tb-badge art';
      b3.innerHTML='<span class="tb-icon">✈️</span><span class="tb-num">'+t.u.a+'</span>';
      tower.appendChild(b3);
    }
    ov.appendChild(tower);
  }
}
// ── Next Turn ──
function nextTurn(){
  turn++;mo++;if(mo>12){mo=1;yr++;}
  var inc=incOf(player);money+=inc;
  // 定期ポップ: 自国地域に自然増員
  for(var id in S){
    var t=S[id];if(t.own!==player)continue;
    var pop=Math.max(1,Math.floor(t.eco*0.05));t.u.i=(t.u.i||0)+pop;
  }
  addLog('[Turn '+turn+'] '+yr+'年'+mo+'月 — 収入+'+inc+' | 定期増員完了','lai');
  aiTurn();updTB();if(sel)updPanel(sel);applyFoW();updTroopLabels();
}
// ── AI Turn ──
function aiTurn(){
  var facs={};
  for(var id in S){
    var f=S[id].own;if(f===player)continue;
    if(!facs[f])facs[f]={ids:[]};facs[f].ids.push(id);
  }
  Object.keys(facs).forEach(function(f){
    if(f===player)return;
    var ids=facs[f].ids;if(!ids.length)return;
    // 前線徴兵: 隣接敵がいる地域に優先増員
    var frontIds=ids.filter(function(id){
      var nbrs=adjOf(id);
      return nbrs.some(function(nid){return S[nid]&&S[nid].own!==f&&!isAlly(f,S[nid].own);});
    });
    var popTargets=frontIds.length?frontIds:ids;
    var fBonus=(FAC[f]&&FAC[f].incBonus)||1.0;
    popTargets.forEach(function(id){
      var t=S[id];var pop=Math.max(1,Math.floor(t.eco*0.07*fBonus));t.u.i=(t.u.i||0)+pop;
    });
    // AI 攻撃
    if(isWar(player,f)){
      var best=null,bestScore=-1;
      ids.forEach(function(fid){
        var ft=S[fid];var nbrs=adjOf(fid);
        nbrs.forEach(function(nid){
          var nt=S[nid];if(!nt||nt.own!==player)return;
          var score=cAtk(ft.u)/Math.max(1,cDef(nt.u));
          if(score>bestScore){bestScore=score;best={fid:fid,tid:nid};}
        });
      });
      if(best&&bestScore>0.6&&Math.random()<0.45){
        var at=S[best.fid],df=S[best.tid];
        var p=0.5+Math.random()*0.3;
        var si=Math.max(1,Math.floor((at.u.i||0)*p));
        var st=Math.max(0,Math.floor((at.u.t||0)*p));
        var ap=si*1.0+st*3.2;ap*=(0.8+Math.random()*0.4);
        var dp=cDef(df.u)*(0.8+Math.random()*0.4);
        at.u.i=Math.max(0,(at.u.i||0)-Math.floor(dp*0.1));
        if(ap>dp){
          df.own=f;df.u={i:si,t:st,a:0};
          at.u.i=Math.max(0,(at.u.i||0)-si);
          df.el.setAttribute('fill',fcol(f));
          addLog('[AI] '+(FAC[f]&&FAC[f].sn)+' → '+df.name+' 占領','lw');
        }else{df.u.i=Math.max(0,(df.u.i||0)-Math.floor((df.u.i||0)*0.1));}
      }
    }
  });
}
// ── Modal ──
function closeModal(){
  var m=document.getElementById('modal');if(m)m.classList.remove('open');
}
// ── Camera ──
function applyTrans(){
  var mi=document.getElementById('mi');if(!mi)return;
  var vp=document.getElementById('vp');
  if(vp){
    var vpW=vp.clientWidth,vpH=vp.clientHeight;
    var mW=mi.offsetWidth||1,mH=mi.offsetHeight||1;
    var margin=60;
    var minX=-(mW*_camZ-margin),maxX=vpW-margin;
    var minY=-(mH*_camZ-margin),maxY=vpH-margin;
    _camX=Math.min(maxX,Math.max(minX,_camX));
    _camY=Math.min(maxY,Math.max(minY,_camY));
  }
  mi.style.transform='translate('+_camX+'px,'+_camY+'px) scale('+_camZ+')';
  // Towers are INSIDE #mi now, so they move with the map automatically.
  // We only need to re-scale the badge sizes (RAF throttled).
  if(_tlRAF)cancelAnimationFrame(_tlRAF);
  _tlRAF=requestAnimationFrame(function(){
    var towers=document.querySelectorAll('.troop-tower');
    var bs=Math.max(0.6,Math.min(1.6,1/_camZ));
    for(var i=0;i<towers.length;i++){
      towers[i].style.transform='translate(-50%,-50%) scale('+bs+')';
    }
  });
}
// ── Input / Controls ──
function setupCtrl(){
  var vp=document.getElementById('vp');if(!vp)return;
  _isMobile=checkMobile();
  // Apply initial transform (already set in processSVG)
  applyTrans();

  // ── Touch: pan + pinch zoom + MANUAL TAP DETECTION ──────────────
  // CRITICAL FIX: calling preventDefault() on touchstart/touchend
  // suppresses the browser's synthetic 'click' event, which means
  // the click listeners bound to each <path> NEVER fire on mobile.
  // We therefore detect taps manually (small movement, short time)
  // and invoke onClick() directly using the ORIGINAL touched element.
  var _tapStartX=0,_tapStartY=0,_tapStartT=0,_tapTarget=null,_tapMoved=false;
  var TAP_MOVE_THRESH=10;   // px — beyond this, it's a drag not a tap
  var TAP_TIME_THRESH=600;  // ms — beyond this, it's a long-press not a tap

  vp.addEventListener('touchstart',function(e){
    if(e.touches.length===1){
      var t0=e.touches[0];
      _drag=true;_tapMoved=false;
      _dragSX=t0.clientX-_camX;_dragSY=t0.clientY-_camY;
      _tapStartX=t0.clientX;_tapStartY=t0.clientY;_tapStartT=Date.now();
      // Capture the actual element under the finger AT TOUCH START —
      // this is the most reliable way to know what was tapped, since
      // touchend's target can differ after any movement/transform.
      _tapTarget=document.elementFromPoint(t0.clientX,t0.clientY);
      vp.classList.add('drag');
    }else if(e.touches.length===2){
      _drag=false;_tapTarget=null;
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      _pinchD=Math.sqrt(dx*dx+dy*dy);
    }
    e.preventDefault();
  },{passive:false});

  vp.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&_drag){
      var t0=e.touches[0];
      var dmx=t0.clientX-_tapStartX,dmy=t0.clientY-_tapStartY;
      if(Math.sqrt(dmx*dmx+dmy*dmy)>TAP_MOVE_THRESH)_tapMoved=true;
      _camX=t0.clientX-_dragSX;
      _camY=t0.clientY-_dragSY;
      applyTrans();
    }else if(e.touches.length===2&&_pinchD>0){
      _tapMoved=true; // pinch is never a tap
      var dx=e.touches[0].clientX-e.touches[1].clientX;
      var dy=e.touches[0].clientY-e.touches[1].clientY;
      var nd=Math.sqrt(dx*dx+dy*dy);
      var mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2};
      var ratio=nd/_pinchD;
      var nz=Math.max(0.15,Math.min(8,_camZ*ratio));
      _camX=mid.x-(mid.x-_camX)*nz/_camZ;
      _camY=mid.y-(mid.y-_camY)*nz/_camZ;
      _camZ=nz;_pinchD=nd;
      applyTrans();
    }
    e.preventDefault();
  },{passive:false});

  vp.addEventListener('touchend',function(e){
    var elapsed=Date.now()-_tapStartT;
    var wasSingleTouch=(e.touches.length===0);
    if(wasSingleTouch&&!_tapMoved&&elapsed<TAP_TIME_THRESH&&_tapTarget){
      // ── This is a genuine TAP: resolve which territory was touched ──
      var node=_tapTarget;
      var tid=null;
      // Walk up from the touched node to find an element registered in S{}
      while(node&&node!==vp){
        var nid=node.getAttribute&&node.getAttribute('id');
        if(nid&&S[nid]){tid=nid;break;}
        node=node.parentElement;
      }
      if(tid){onClick(tid);}
    }
    if(e.touches.length===0){_drag=false;_tapTarget=null;vp.classList.remove('drag');}
    e.preventDefault();
  },{passive:false});
  // Mouse: pan
  vp.addEventListener('mousedown',function(e){
    if(e.button!==0)return;
    _drag=true;_dragSX=e.clientX-_camX;_dragSY=e.clientY-_camY;vp.classList.add('drag');
  });
  document.addEventListener('mousemove',function(e){
    if(!_drag)return;_camX=e.clientX-_dragSX;_camY=e.clientY-_dragSY;applyTrans();
  });
  document.addEventListener('mouseup',function(){
    _drag=false;var v=document.getElementById('vp');if(v)v.classList.remove('drag');
  });
  // Mouse wheel zoom
  vp.addEventListener('wheel',function(e){
    e.preventDefault();
    var rect=vp.getBoundingClientRect();var mx=e.clientX-rect.left,my=e.clientY-rect.top;
    var delta=e.deltaY>0?0.85:1.18;
    var nz=Math.max(0.15,Math.min(8,_camZ*delta));
    _camX=mx-(mx-_camX)*nz/_camZ;_camY=my-(my-_camY)*nz/_camZ;
    _camZ=nz;applyTrans();
  },{passive:false});

  // Panel swipe up/down on mobile header
  var ph=document.getElementById('ph');
  if(ph){
    var pyStart=0,pyCur=0,pDrag=false;
    ph.addEventListener('touchstart',function(e){pyStart=e.touches[0].clientY;pDrag=true;e.stopPropagation();},{passive:true});
    ph.addEventListener('touchmove',function(e){if(pDrag)pyCur=e.touches[0].clientY;e.stopPropagation();},{passive:true});
    ph.addEventListener('touchend',function(e){
      if(!pDrag)return;
      var diff=pyCur-pyStart;
      if(diff<-30)_panelOpen=true;else if(diff>30)_panelOpen=false;else _panelOpen=!_panelOpen;
      var sp=document.getElementById('sp'),tog=document.getElementById('sp-tog');
      if(sp)sp.classList.toggle('open',_panelOpen);
      if(tog)tog.textContent=_panelOpen?'▼ PANEL':'▲ PANEL';
      pDrag=false;e.stopPropagation();
    },{passive:true});
    ph.addEventListener('click',function(){if(!checkMobile())return;togglePanel();});
  }
  // Topbar WORLD / DIPL buttons
  var tbw=document.getElementById('tb-w');
  if(tbw){
    var ws=document.createElement('button');ws.className='btn';ws.textContent='WORLD';
    ws.style.cssText='padding:2px 6px;font-size:7px;';ws.onclick=function(){showWorldStatus();};
    tbw.appendChild(ws);
    var dp=document.createElement('button');dp.className='btn';dp.textContent='DIPL';
    dp.style.cssText='padding:2px 6px;font-size:7px;';dp.onclick=function(){showDiplomStatus();};
    tbw.appendChild(dp);
  }
  // Resize
  window.addEventListener('resize',function(){
    _isMobile=checkMobile();
    if(!_isMobile){var sp=document.getElementById('sp');if(sp){sp.classList.remove('open');_panelOpen=false;}}
    applyTrans();updTroopLabels();
  });
}
