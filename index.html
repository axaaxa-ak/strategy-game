<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern World Strategy</title>
    <style>
        body { margin: 0; background: #0077be; overflow: hidden; font-family: sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; cursor: grab; }
        svg { width: 2000px; height: auto; cursor: pointer; } /* 地図のサイズ */
        
        /* UIレイアウト（スクショを意識） */
        #left-panel { position: absolute; left: 10px; top: 10px; width: 180px; background: rgba(139, 69, 19, 0.9); border: 3px solid #5d2906; border-radius: 8px; padding: 15px; z-index: 100; color: #fff; }
        .ui-btn { background: #d2691e; color: white; border: 2px solid #5d2906; border-radius: 5px; padding: 8px; width: 100%; margin: 5px 0; font-weight: bold; cursor: pointer; font-size: 12px; }
        #turn-btn { position: absolute; right: 20px; top: 20px; background: #ff8c00; color: white; border: 2px solid #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 100; }
        
        /* 選択時のエフェクト */
        path:hover { fill-opacity: 0.7; }
        .selected-path { stroke: yellow !important; stroke-width: 2px !important; }
    </style>
</head>
<body>

<div id="left-panel">
    <div style="font-size: 20px; text-align: center; margin-bottom: 10px;">🛡️ 20% ➕</div>
    <div id="country-name" style="background: #555; padding: 5px; text-align: center;">国を選択</div>
    <div style="margin: 10px 0;">💰 <span id="money">0</span></div>
    <div style="margin: 10px 0;">⚔️ <span id="power">0</span></div>
    <button class="ui-btn">Statistics</button>
    <button class="ui-btn" onclick="buildArmy()">Build an army</button>
    <button class="ui-btn">Recall the armies</button>
</div>

<button id="turn-btn" onclick="nextTurn()">End of turn</button>

<div id="game-container">
    <div id="svg-map"></div>
</div>

<script>
    // SVGを読み込む処理
    fetch('MapChart_Map.svg')
        .then(response => response.text())
        .then(svgData => {
            const mapDiv = document.getElementById('svg-map');
            mapDiv.innerHTML = svgData;
            const svg = mapDiv.querySelector('svg');
            svg.setAttribute('width', '2500'); // 地図をデカくする
            
            // すべてのpath（ステート）にクリックイベントを付与
            const paths = svg.querySelectorAll('path');
            paths.forEach(path => {
                path.style.transition = "0.2s";
                path.onclick = function(e) {
                    // 以前の選択を解除
                    const prev = svg.querySelector('.selected-path');
                    if(prev) prev.classList.remove('selected-path');
                    
                    // 今回の選択を強調
                    this.classList.add('selected-path');
                    document.getElementById('country-name').innerText = this.getAttribute('title') || this.id || "Unknown";
                    
                    // テスト：クリックしたところを自軍の色（青）に変える
                    this.style.fill = "#0000ff"; 
                };
            });
        });

    function buildArmy() {
        const moneyEl = document.getElementById('money');
        let m = parseInt(moneyEl.innerText);
        moneyEl.innerText = m + 1000;
        alert("徴兵を開始します。");
    }

    function nextTurn() {
        alert("ターン終了。各ステートから税収が発生します。");
    }
</script>

</body>
</html>
