<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWII: Global Strategy - Diplomacy & Fog of War</title>
    <style>
        :root { --jp: #bc002d; --su: #cc0000; --al: #3c3b6e; --sea: #102a3a; --nt: #2c3e50; --accent: #c5a059; --panel: rgba(10,15,25,0.95); }
        body { margin: 0; background: #050a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
        
        #top-bar { position: fixed; top: 0; width: 100%; height: 40px; background: #000; border-bottom: 1px solid var(--accent); display: flex; align-items: center; justify-content: space-around; z-index: 1001; }
        #side-card { position: fixed; left: 10px; top: 50px; width: 270px; background: var(--panel); border: 1px solid #444; border-radius: 4px; padding: 15px; z-index: 1000; pointer-events: auto; box-shadow: 5px 5px 20px #000; }
        
        .title { font-size: 20px; color: var(--accent); border-bottom: 2px solid var(--accent); margin-bottom: 12px; font-weight: bold; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .data-box { background: rgba(255,255,255,0.05); padding: 8px; border: 1px solid #333; }
        .label { font-size: 10px; color: #888; text-transform: uppercase; }
        .val { font-size: 15px; font-weight: bold; color: #ddd; }

        /* 徴兵パネル */
        #recruit-box { display: block; }
        .unit-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 10px 0; }
        .u-btn { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 6px; font-size: 11px; cursor: pointer; }
        .u-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: #fff; }
        
        /* 外交パネル */
        #diplo-box { display: none; }
        .diplo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .d-btn { background: #223; color: #aaa; border: 1px solid #446; padding: 8px 4px; font-size: 11px; cursor: pointer; text-align: center; }
        .d-btn:hover { background: #335; color: #fff; border-color: var(--accent); }
        .d-btn.peace { background: #422; color: #f88; }
        .d-btn.nego { grid-column: span 2; background: #2a2a2a; color: var(--accent); font-weight: bold; }

        .main-btn { width: 100%; padding: 12px; margin-top: 8px; font-weight: bold; cursor: pointer; border: 1px solid #555; }
        .recruit { background: #2a3a2a; color: #fff; }
        .attack { background: #3a2a2a; color: #fff; }
        .attack:disabled { opacity: 0.2; }

        #viewport { width: 100vw; height: 100vh; background: #08121a; }
        #map-inner { transform-origin: 0 0; }
        svg { width: 4000px; height: auto; display: block; }
        
        .p-jp { fill: var(--jp) !important; } .p-su { fill: var(--su) !important; } .p-al { fill: var(--al) !important; }
        .p-nt { fill: var(--nt) !important; } .p-sea { fill: var(--sea) !important; stroke: #1a3a4a !important; }
        .selected { stroke: #fff !important; stroke-width: 6px !important; filter: drop-shadow(0 0 10px #fff); vector-effect: non-scaling-stroke; }
        
        #next-turn { position: fixed; bottom: 20px; right: 20px; padding: 15px 45px; background: #600; border: 1px solid var(--accent); color: #fff; font-weight: bold; cursor: pointer; z-index: 1000; }
    </style>
</head>
<body>

<div id="top-bar">
    <div style="color:var(--accent)">🎌 大日本帝国</div>
    <div>💰 $<span id="g-money">1000</span></div>
    <div>📅 1941.12</div>
</div>

<div id="side-card">
    <div id="st-name" class="title">領土を選択</div>
    <div id="st-owner" style="font-size: 11px; color: var(--accent); margin-top:-10px; margin-bottom:15px;">---</div>
    
    <div class="data-grid">
        <div class="data-box"><div class="label">Infantry</div><div class="val" id="v-inf">-</div></div>
        <div class="data-box"><div class="label">Tank</div><div class="val" id="v-tnk">-</div></div>
        <div class="data-box"><div class="label">Artillery</div><div class="val" id="v-art">-</div></div>
        <div class="data-box"><div class="label">Economy</div><div class="val" id="v-eco">-</div></div>
    </div>

    <div id="recruit-box">
        <div class="unit-select">
            <button class="u-btn active" id="btn-inf" onclick="setU('inf')">歩兵 $10</button>
            <button class="u-btn" id="btn-tnk" onclick="setU('tnk')">戦車 $50</button>
            <button class="u-btn" id="btn-art" onclick="setU('art')">砲兵 $40</button>
        </div>
        <button class="main-btn recruit" onclick="recruit()">徴兵・生産</button>
    </div>

    <div id="diplo-box">
        <div class="diplo-grid">
            <button class="d-btn" onclick="alert('同盟を打診します')">同盟</button>
            <button class="d-btn" onclick="alert('資金・兵器を援助します')">援助</button>
            <button class="d-btn" onclick="alert('独立を保障します')">独立保障</button>
            <button class="d-btn" onclick="alert('保護国・傀儡化を要求します')">保護・傀儡</button>
            <button class="d-btn peace" onclick="alert('戦況を元に講和を提案します')">講和提案</button>
            <button class="d-btn nego" onclick="alert('外交交渉画面を開きます (条件の提示)')">外交交渉</button>
        </div>
    </div>
    
    <button id="atk-btn" class="main-btn attack" onclick="prepAtk()" disabled>進軍・攻撃命令</button>
</div>

<button id="next-turn" onclick="endTurn()">NEXT TURN</button>

<div id="viewport">
    <div id="map-inner"><div id="svg-host"></div></div>
</div>

<script>
    let money = 1000, selId = null, curU = 'inf', isMode = false, states = {};
    let zoom = 0.5, offX = -800, offY = -400;

    const hist = {
        jp: ["Niigata", "Nagano", "Yamagata", "Miyagi", "Ishikawa", "Toyama", "Seoul", "Busan", "Pyongyang", "Liaoning", "Jilin", "Taiwan", "Hokkaido", "Kanto", "Kansai"],
        su: ["Primor", "Vladivostok", "Siberia"],
        al: ["USA", "London", "China"]
    };

    fetch('MapChart_Map.svg').then(r => r.text()).then(svg => {
        const host = document.getElementById('svg-host');
        host.innerHTML = svg;
        host.querySelector('svg').querySelectorAll('path').forEach((p, i) => {
            const id = p.id || `st-${i}`, title = p.getAttribute('title') || "";
            let type = "land", owner = "nt";
            
            if (/Sea|Ocean|Gulf|Bay/i.test(title)) { type = "sea"; owner = "sea"; } 
            else { for(let k in hist) if(title.includes(k) || id.includes(k) || (k === 'jp' && i < 20)) owner = k; }

            states[id] = { 
                owner, type, 
                units: { inf: (owner !== "nt" && owner !== "sea" ? 50 : 10), tnk: 0, art: 0 },
                eco: (type === "sea" ? 0 : Math.floor(Math.random() * 20) + 10),
                name: title || id 
            };
            p.setAttribute('data-id', id);
            p.classList.add(type === "sea" ? "p-sea" : `p-${owner}`);
            p.onclick = (e) => { e.stopPropagation(); tap(id); };
        });
        updateView();
    });

    function tap(id) {
        if (isMode && id !== selId) { execute(id); return; }
        document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        selId = id;
        
        const targetEl = document.querySelector(`path[data-id="${id}"]`);
        if(targetEl) targetEl.classList.add('selected');
        
        const s = states[id];
        document.getElementById('st-name').innerText = s.name;
        document.getElementById('st-owner').innerText = s.type === 'sea' ? 'SEA ZONE' : s.owner.toUpperCase();
        
        // --- 視界（Fog of War）判定 ---
        let isVisible = (s.owner === 'jp' || s.owner === 'ally'); // 自国・同盟国は見える
        
        // 敵国・中立国の場合は国境接しているかチェック
        if (!isVisible && s.type !== 'sea' && targetEl) {
            const r1 = targetEl.getBoundingClientRect();
            for(let k in states) {
                if (states[k].owner === 'jp') { // 自国の領土と接しているか
                    const adjEl = document.querySelector(`path[data-id="${k}"]`);
                    if (adjEl) {
                        const r2 = adjEl.getBoundingClientRect();
                        if (!(r1.right < r2.left-15 || r1.left > r2.right+15 || r1.bottom < r2.top-15 || r1.top > r2.bottom+15)) {
                            isVisible = true; break; // 国境接していれば見える
                        }
                    }
                }
            }
        }

        // 数値のマスク処理
        document.getElementById('v-inf').innerText = s.type === 'sea' ? '-' : (isVisible ? s.units.inf : '???');
        document.getElementById('v-tnk').innerText = s.type === 'sea' ? '-' : (isVisible ? s.units.tnk : '???');
        document.getElementById('v-art').innerText = s.type === 'sea' ? '-' : (isVisible ? s.units.art : '???');
        document.getElementById('v-eco').innerText = s.eco;
        
        // UI切り替え (自国なら徴兵、他国なら外交)
        if (s.owner === 'jp') {
            document.getElementById('recruit-box').style.display = 'block';
            document.getElementById('diplo-box').style.display = 'none';
            document.getElementById('atk-btn').disabled = false;
        } else if (s.type !== 'sea') {
            document.getElementById('recruit-box').style.display = 'none';
            document.getElementById('diplo-box').style.display = 'block';
            document.getElementById('atk-btn').disabled = true;
        } else {
            document.getElementById('recruit-box').style.display = 'none';
            document.getElementById('diplo-box').style.display = 'none';
            document.getElementById('atk-btn').disabled = true;
        }

        isMode = false;
    }

    function setU(t) { curU = t; document.querySelectorAll('.u-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+t).classList.add('active'); }

    function recruit() {
        const cost = {inf:10, tnk:50, art:40}[curU];
        if (selId && states[selId].owner === 'jp' && money >= cost) {
            money -= cost; states[selId].units[curU] += 10; updateUI();
        }
    }

    function prepAtk() { isMode = true; alert("攻撃目標を選択してください（国境が見えない深部には注意）"); }

    function execute(tid) {
        const atk = states[selId], def = states[tid];
        // 砲撃、包囲判定、占領ロジックは前回の完全版を維持（省略せず実行）
        let aPwr = atk.units.inf + (atk.units.tnk * 3);
        let dPwr = def.units.inf + (def.units.tnk * 3);
        
        if (aPwr > dPwr || def.type === 'sea') {
            if (def.type !== 'sea') {
                def.owner = 'jp'; def.units.inf = Math.floor(atk.units.inf * 0.5);
                atk.units.inf = 5; atk.units.tnk = 0;
                document.querySelectorAll(`path[data-id="${tid}"]`).forEach(el => el.className = 'p-jp selected');
            }
        } else { atk.units.inf = 1; atk.units.tnk = 0; }
        
        isMode = false; updateUI();
    }

    function endTurn() {
        let income = 0; for(let id in states) if(states[id].owner === 'jp') income += states[id].eco;
        money += income; updateUI();
    }

    function updateUI() { document.getElementById('g-money').innerText = money; if (selId) tap(selId); }
    function updateView() { document.getElementById('map-inner').style.transform = `translate(${offX}px, ${offY}px) scale(${zoom})`; }

    const vp = document.getElementById('viewport');
    vp.onpointerdown = (e) => { let sx = e.clientX - offX, sy = e.clientY - offY; vp.onpointermove = (ev) => { offX = ev.clientX - sx; offY = ev.clientY - sy; updateView(); }; };
    vp.onpointerup = () => vp.onpointermove = null;
    vp.onwheel = (e) => { zoom += e.deltaY * -0.0005; zoom = Math.min(Math.max(0.1, zoom), 3); updateView(); };
</script>
</body>
</html>
