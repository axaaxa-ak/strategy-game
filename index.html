<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern World Strategy - V3</title>
    <style>
        body { margin: 0; background: #0077be; overflow: hidden; font-family: sans-serif; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: auto; }
        svg { width: 4000px; height: auto; }
        
        /* UIパネル */
        #left-panel { position: absolute; left: 10px; top: 10px; width: 220px; background: rgba(139, 69, 19, 0.95); border: 3px solid #5d2906; border-radius: 8px; padding: 15px; z-index: 100; pointer-events: auto; }
        .ui-btn { background: #d2691e; color: white; border: 2px solid #5d2906; border-radius: 5px; padding: 10px; width: 100%; margin: 5px 0; font-weight: bold; cursor: pointer; }
        #turn-btn { position: absolute; right: 20px; top: 20px; background: #ff8c00; color: white; border: 2px solid #fff; padding: 12px 25px; border-radius: 8px; font-weight: bold; z-index: 100; cursor: pointer; }
        
        /* 勢力スタイル */
        .player-land { fill: #cc3333 !important; } /* 赤：自軍 */
        .enemy-land { fill: #3333cc !important; }  /* 青：敵軍 */
        .neutral-land { fill: #d1dbdd !important; }
        .selected-path { stroke: yellow !important; stroke-width: 5px !important; vector-effect: non-scaling-stroke; }
        
        /* 兵力ラベル */
        .army-label { position: absolute; background: rgba(0,0,0,0.6); color: white; padding: 2px 5px; border-radius: 3px; font-size: 12px; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="left-panel">
    <div id="c-name" style="background: #5d2906; padding: 8px; text-align: center; font-weight: bold;">Stateを選択</div>
    <div style="margin: 10px 0;">💰 資金: $<span id="money">100</span></div>
    <div style="margin: 10px 0;">⚔️ 選択地の兵力: <span id="local-army">-</span></div>
    <button class="ui-btn" onclick="reinforce()">兵力を強化 ($10)</button>
    <button class="ui-btn" id="atk-btn" onclick="startAttack()" disabled>隣接地へ攻撃</button>
</div>

<button id="turn-btn" onclick="nextTurn()">End of Turn</button>
<div id="game-container"><div id="svg-map"></div></div>

<script>
    let money = 100;
    let selectedId = null;
    let stateData = {}; // 全土地のデータを保持 { id: { owner: 'player', army: 10 } }

    fetch('MapChart_Map.svg')
        .then(response => response.text())
        .then(svgData => {
            const mapDiv = document.getElementById('svg-map');
            mapDiv.innerHTML = svgData;
            const svg = mapDiv.querySelector('svg');
            
            svg.querySelectorAll('path').forEach((path, i) => {
                const id = path.id || `state-${i}`;
                path.id = id;
                
                // 初期データ作成
                let owner = 'neutral';
                let army = Math.floor(Math.random() * 5) + 1;
                if(i === 0) { owner = 'player'; army = 20; }
                else if(i > 200 && i < 210) { owner = 'enemy'; army = 15; } // 遠くに敵を配置
                
                stateData[id] = { owner, army };
                updatePathVisual(path, owner);

                path.onclick = function() {
                    if(selectedId) document.getElementById(selectedId).classList.remove('selected-path');
                    selectedId = this.id;
                    this.classList.add('selected-path');
                    document.getElementById('c-name').innerText = this.getAttribute('title') || this.id;
                    document.getElementById('local-army').innerText = stateData[selectedId].army;
                    checkAttackable();
                };
            });
            refreshLabels();
        });

    function updatePathVisual(el, owner) {
        el.classList.remove('player-land', 'enemy-land', 'neutral-land');
        el.classList.add(`${owner}-land`);
    }

    function checkAttackable() {
        const btn = document.getElementById('atk-btn');
        if(!selectedId || stateData[selectedId].owner !== 'player') {
            btn.disabled = true; return;
        }
        btn.disabled = false;
    }

    function startAttack() {
        alert("攻撃したい隣接する土地を直接タップしてください");
        // 次のタップを攻撃として扱うフラグ
        window.isAttacking = true;
    }

    // 地図全体のクリック判定を拡張（攻撃処理）
    document.addEventListener('click', (e) => {
        if(window.isAttacking && e.target.tagName === 'path' && e.target.id !== selectedId) {
            const targetId = e.target.id;
            const attacker = stateData[selectedId];
            const defender = stateData[targetId];

            if(attacker.army > defender.army) {
                alert("勝利！土地を占領しました。");
                attacker.army -= defender.army;
                defender.army = Math.floor(attacker.army / 2);
                attacker.army -= defender.army;
                defender.owner = 'player';
                updatePathVisual(e.target, 'player');
            } else {
                alert("敗北！兵力が足りません。");
                attacker.army = 1;
            }
            window.isAttacking = false;
            refreshLabels();
            updateStats();
        }
    });

    function reinforce() {
        if(selectedId && stateData[selectedId].owner === 'player' && money >= 10) {
            money -= 10;
            stateData[selectedId].army += 10;
            refreshLabels();
            updateStats();
        }
    }

    function nextTurn() {
        // AIの行動（簡易版：敵が隣のプレイヤーを殴る）
        for(let id in stateData) {
            if(stateData[id].owner === 'enemy') {
                stateData[id].army += 2; // 自然増
            }
            if(stateData[id].owner === 'player') {
                money += 5; // 税収
            }
        }
        alert("ターン終了。敵軍が動いています...");
        updateStats();
        refreshLabels();
    }

    function refreshLabels() {
        // 兵力表示の更新（重い場合は間引く）
        document.querySelectorAll('.army-label').forEach(l => l.remove());
        const svg = document.querySelector('svg');
        for(let id in stateData) {
            if(stateData[id].army > 0) {
                const path = document.getElementById(id);
                const rect = path.getBoundingClientRect();
                const label = document.createElement('div');
                label.className = 'army-label';
                label.style.left = (window.scrollX + rect.left + rect.width/2) + 'px';
                label.style.top = (window.scrollY + rect.top + rect.height/2) + 'px';
                label.innerText = stateData[id].army;
                document.body.appendChild(label);
            }
        }
    }

    function updateStats() {
        document.getElementById('money').innerText = money;
        if(selectedId) document.getElementById('local-army').innerText = stateData[selectedId].army;
    }
</script>
</body>
</html>
