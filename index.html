<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Strategy - Empire of Japan</title>
    <style>
        :root { --jp: #bc002d; --nt: #2c3e50; --sea: #102a3a; --accent: #c5a059; }
        body { margin: 0; background: #050a0f; overflow: hidden; font-family: sans-serif; color: #fff; touch-action: none; }
        
        /* UIパネル：AoH2風 */
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #top-info { position: absolute; top: 0; width: 100%; height: 35px; background: #000; border-bottom: 1px solid var(--accent); display: flex; align-items: center; justify-content: space-around; pointer-events: auto; }
        #side-card { position: absolute; left: 10px; top: 45px; width: 260px; background: rgba(10,15,25,0.95); border: 1px solid #444; padding: 15px; pointer-events: auto; box-shadow: 5px 5px 15px #000; }
        
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; border-bottom: 1px solid #222; }
        .btn { background: #1a1a1a; color: #fff; border: 1px solid var(--accent); width: 100%; padding: 10px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn:active { background: var(--accent); color: #000; }
        
        /* マップ */
        #viewport { width: 100vw; height: 100vh; background: #08121a; }
        #map-container { transform-origin: 0 0; }
        svg { width: 4000px; height: auto; display: block; }
        
        /* クラス別色塗り */
        .p-jp { fill: var(--jp) !important; }
        .p-nt { fill: var(--nt) !important; }
        .p-sea { fill: var(--sea) !important; stroke: #1a3a4a !important; }
        .selected { stroke: #fff !important; stroke-width: 5px !important; filter: drop-shadow(0 0 8px #fff); vector-effect: non-scaling-stroke; }
        
        #next-turn { position: absolute; bottom: 20px; right: 20px; padding: 15px 40px; background: #700; border: 1px solid #fff; color: #fff; font-weight: bold; pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="top-info">
        <span style="color:var(--accent)">大日本帝国</span>
        <span>💰 $<span id="m-val">1000</span></span>
        <span>Turn: <span id="t-val">1</span></span>
    </div>
    <div id="side-card">
        <div id="st-name" style="font-size: 20px; color: var(--accent); border-bottom: 1px solid #555; margin-bottom: 10px;">領土を選択</div>
        <div class="stat-row"><span>勢力</span><span id="st-owner">---</span></div>
        <div class="stat-row"><span>兵力</span><span id="st-army">---</span></div>
        <div class="stat-row"><span>経済</span><span id="st-eco">---</span></div>
        <button class="btn" onclick="addArmy()">徴兵・配備 ($50)</button>
        <button id="atk-btn" class="btn" onclick="startAtk()" style="background:#422;" disabled>進軍命令</button>
    </div>
    <button id="next-turn" onclick="nextTurn()">NEXT TURN</button>
</div>

<div id="viewport">
    <div id="map-container"><div id="svg-host"></div></div>
</div>

<script>
    let money = 1000, turn = 1, selId = null, isAtk = false, states = {};
    let zoom = 0.6, offX = -500, offY = -300; // 初期位置調整

    fetch('MapChart_Map.svg').then(r => r.text()).then(svg => {
        const host = document.getElementById('svg-host');
        host.innerHTML = svg;
        const paths = host.querySelector('svg').querySelectorAll('path');
        
        paths.forEach((p, i) => {
            const id = p.id || `st-${i}`;
            const title = p.getAttribute('title') || "";
            
            // --- 領土割当の強制修正 ---
            let type = "land", owner = "nt";
            if (/Sea|Ocean|Gulf|Bay/i.test(title)) {
                type = "sea"; owner = "sea";
            } else if (i < 20 || title.includes("Japan") || title.includes("Niigata") || title.includes("Tokyo")) {
                // インデックス 0〜19 を強制的に日本領にする（これで「領土なし」を防ぐ）
                owner = "jp";
            }

            states[id] = { 
                owner, type, 
                army: (owner === "jp" ? 100 : 10), 
                eco: (type === "sea" ? 0 : 20),
                name: title || `Region ${i}` 
            };

            p.setAttribute('data-id', id);
            p.classList.add(type === "sea" ? "p-sea" : `p-${owner}`);
            p.onclick = (e) => { e.stopPropagation(); tap(id); };
        });
        updateView();
    });

    function tap(id) {
        if (isAtk && id !== selId) { executeAtk(id); return; }
        document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        selId = id;
        document.querySelectorAll(`path[data-id="${id}"]`).forEach(el => el.classList.add('selected'));
        
        const s = states[id];
        document.getElementById('st-name').innerText = s.name;
        document.getElementById('st-owner').innerText = s.owner.toUpperCase();
        document.getElementById('st-army').innerText = s.type === "sea" ? "---" : s.army;
        document.getElementById('st-eco').innerText = s.type === "sea" ? "---" : s.eco;
        document.getElementById('atk-btn').disabled = (s.owner !== 'jp');
        isAtk = false;
    }

    function addArmy() {
        if (selId && states[selId].owner === 'jp' && money >= 50) {
            money -= 50; states[selId].army += 50; updateUI();
        }
    }

    function startAtk() { isAtk = true; alert("攻撃先または移動先の土地を選択してください"); }

    function executeAtk(tid) {
        const atk = states[selId], def = states[tid];
        if (atk.army > def.army) {
            def.owner = 'jp'; def.army = Math.floor(atk.army * 0.6); atk.army = 10;
            document.querySelectorAll(`path[data-id="${tid}"]`).forEach(el => {
                el.className = 'p-jp selected';
            });
            alert("制圧成功！");
        } else {
            atk.army = 1; alert("敗北...");
        }
        isAtk = false; updateUI();
    }

    function nextTurn() {
        turn++;
        let income = 0;
        for(let id in states) if(states[id].owner === 'jp') income += states[id].eco;
        money += income;
        updateUI();
        alert(`Turn ${turn}\n歳入 $${income} を獲得しました。`);
    }

    function updateUI() {
        document.getElementById('m-val').innerText = money;
        document.getElementById('t-val').innerText = turn;
        if (selId) tap(selId);
    }

    // 操作系
    const cont = document.getElementById('map-container'), vp = document.getElementById('viewport');
    vp.onpointerdown = (e) => {
        let sx = e.clientX - offX, sy = e.clientY - offY;
        vp.onpointermove = (ev) => { offX = ev.clientX - sx; offY = ev.clientY - sy; updateView(); };
    };
    vp.onpointerup = () => vp.onpointermove = null;
    vp.onwheel = (e) => { zoom += e.deltaY * -0.0005; zoom = Math.min(Math.max(0.1, zoom), 3); updateView(); };
    function updateView() { cont.style.transform = `translate(${offX}px, ${offY}px) scale(${zoom})`; }
</script>
</body>
</html>
