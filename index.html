<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWII Strategic Front - FINAL</title>
    <style>
        :root { --jp: #bc002d; --su: #cc0000; --ge: #444; --al: #3c3b6e; --nt: #d1dbdd; }
        body { margin: 0; background: #002b36; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        #gui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        #panel { position: absolute; left: 10px; top: 10px; width: 230px; background: rgba(50, 25, 10, 0.95); border: 3px solid #3d1a00; border-radius: 8px; padding: 12px; pointer-events: auto; }
        .btn { background: #d2691e; color: white; border: 1px solid #5d2906; width: 100%; padding: 10px; margin: 4px 0; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .u-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 8px 0; }
        .u-btn { background: #444; font-size: 10px; padding: 5px; border: 1px solid #fff; color: #fff; cursor: pointer; }
        .u-btn.active { background: #ff8c00; color: #000; font-weight: bold; }
        #viewport { width: 100vw; height: 100vh; overflow: hidden; background: #003d4d; }
        #map-inner { transform-origin: 0 0; }
        svg { width: 4000px; height: auto; display: block; }
        /* 勢力クラス */
        .p-jp { fill: var(--jp) !important; } .p-su { fill: var(--su) !important; }
        .p-ge { fill: var(--ge) !important; } .p-al { fill: var(--al) !important; }
        .p-nt { fill: var(--nt) !important; }
        .sel { stroke: #ffff00 !important; stroke-width: 12px !important; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>

<div id="gui">
    <div id="panel">
        <div id="n-disp" style="font-weight: bold; font-size: 18px; border-bottom: 2px solid #ff8c00;">Stateを選択</div>
        <div id="o-disp" style="font-size: 11px; margin-bottom: 8px;">勢力: ---</div>
        <div style="font-size: 14px;">💰 資金: $<span id="m-val">1000</span></div>
        <div id="u-info" style="font-size: 13px; color: #ffcc00; margin: 5px 0;">兵科: ---</div>
        <div class="u-select">
            <button class="u-btn active" id="b-inf" onclick="setU('inf')">歩兵<br>$10</button>
            <button class="u-btn" id="b-tnk" onclick="setU('tnk')">戦車<br>$50</button>
            <button class="u-btn" id="b-art" onclick="setU('art')">砲兵<br>$40</button>
        </div>
        <button class="btn" onclick="deploy()">配備 ($<span id="c-cost">10</span>)</button>
        <button id="atk-btn" class="btn" onclick="prepAction()" disabled>進軍/攻撃開始</button>
    </div>
    <button id="turn-btn" style="position:absolute; right:10px; top:10px; padding:15px; background:#b22222; color:white; font-weight:bold; border-radius:8px; pointer-events:auto;" onclick="endTurn()">TURN END</button>
</div>

<div id="viewport">
    <div id="map-inner"><div id="svg-host"></div></div>
</div>

<script>
    let money = 1000, selId = null, curU = 'inf', isMode = false, states = {};
    let zoom = 0.5, offX = 0, offY = 0;

    const hist = {
        jp: ["Niigata", "Nagano", "Yamagata", "Miyagi", "Ishikawa", "Toyama", "Gifu", "Seoul", "Busan", "Pyongyang", "Liaoning", "Jilin", "Taiwan", "Hokkaido", "Kanto", "Kansai"],
        su: ["Primor", "Vladivostok", "Siberia", "Sakhalin"],
        ge: ["Berlin", "Germany", "Poland"],
        al: ["USA", "UK", "France", "China"]
    };

    fetch('MapChart_Map.svg').then(r => r.text()).then(svg => {
        const host = document.getElementById('svg-host');
        host.innerHTML = svg;
        host.querySelector('svg').querySelectorAll('path').forEach((p, i) => {
            const id = p.id || `st-${i}`, title = p.getAttribute('title') || "";
            let owner = "nt";
            for(let k in hist) if(title.includes(k) || id.includes(k)) owner = k;
            states[id] = { owner, unit: (owner !== "nt" ? 'inf' : null), hp: (owner === "nt" ? 10 : 100), name: title || id };
            p.setAttribute('data-id', id);
            p.classList.add(`p-${owner}`);
            p.onclick = (e) => { e.stopPropagation(); tap(id); };
        });
        updatePos();
    });

    function tap(id) {
        if (isMode && id !== selId) { execute(id); return; }
        document.querySelectorAll('.sel').forEach(el => el.classList.remove('sel'));
        selId = id;
        document.querySelectorAll(`path[data-id="${id}"]`).forEach(el => el.classList.add('sel'));
        const s = states[id];
        document.getElementById('n-disp').innerText = s.name;
        document.getElementById('o-disp').innerText = "勢力: " + s.owner.toUpperCase();
        document.getElementById('u-info').innerText = s.unit ? `兵科: ${uName(s.unit)} (HP:${s.hp})` : "駐留なし";
        document.getElementById('atk-btn').disabled = (s.owner !== 'jp' || !s.unit);
        isMode = false;
    }

    function uName(t) { return {inf:'歩兵', tnk:'戦車', art:'砲兵'}[t]; }
    function setU(t) { curU = t; document.querySelectorAll('.u-btn').forEach(b => b.classList.remove('active')); document.getElementById('b-'+t).classList.add('active'); document.getElementById('c-cost').innerText = {inf:10, tnk:50, art:40}[t]; }

    function deploy() {
        if (!selId || states[selId].owner !== 'jp') return;
        const cost = {inf:10, tnk:50, art:40}[curU];
        if (money >= cost) { money -= cost; states[selId].unit = curU; states[selId].hp = 100; updateUI(); }
    }

    function prepAction() { isMode = true; alert("目標のステートをタップしてください。"); }

    function execute(tid) {
        const atk = states[selId], def = states[tid];
        if (atk.unit === 'art') {
            def.hp -= 45; alert("砲撃成功！");
        } else {
            const pwr = atk.unit === 'tnk' ? 90 : 40;
            if (pwr > def.hp || def.owner === 'nt') {
                def.owner = 'jp'; def.unit = atk.unit; def.hp = 60; atk.unit = null;
                document.querySelectorAll(`path[data-id="${tid}"]`).forEach(el => {
                    el.className = 'p-jp sel'; // クラスを完全に書き換え
                });
                alert(def.name + " を占領！");
            } else { atk.hp -= 50; alert("進軍失敗..."); }
        }
        isMode = false; updateUI();
    }

    function endTurn() {
        let count = 0; for(let id in states) if(states[id].owner === 'jp') count++;
        money += (count * 20); alert(`ターン終了：税収 $${count*20} 獲得`);
        updateUI();
    }

    function updateUI() {
        document.getElementById('m-val').innerText = money;
        if (selId) tap(selId);
    }

    const mi = document.getElementById('map-inner'), vp = document.getElementById('viewport');
    vp.onpointerdown = (e) => {
        let sx = e.clientX - offX, sy = e.clientY - offY;
        vp.onpointermove = (ev) => { offX = ev.clientX - sx; offY = ev.clientY - sy; updatePos(); };
    };
    vp.onpointerup = () => vp.onpointermove = null;
    vp.onwheel = (e) => { zoom += e.deltaY * -0.001; zoom = Math.min(Math.max(0.1, zoom), 3); updatePos(); };
    function updatePos() { mi.style.transform = `translate(${offX}px, ${offY}px) scale(${zoom})`; }
</script>
</body>
</html>
