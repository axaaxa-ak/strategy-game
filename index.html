<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>世界大戦略 1936 — WORLD COMMAND</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050a0e;--panel:#091420;--border:#162434;--border2:#1e3448;
  --acc:#c8a248;--acc2:rgba(200,162,72,.13);--acc3:#8a6e2e;
  --txt:#b8ccd8;--dim:#486070;
  --jp:#c81630;--su:#8b1c1c;--cn:#1848b0;--ge:#444444;--al:#186038;--nt:#3c5c28;
  --font:'Share Tech Mono',monospace;--head:'Orbitron',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font);overflow:hidden;user-select:none}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);pointer-events:none;z-index:9999}
/* TOP BAR */
#tb{position:fixed;top:0;left:0;right:0;height:44px;background:var(--panel);border-bottom:1px solid var(--border2);display:flex;align-items:stretch;z-index:1000}
.tbs{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid var(--border);min-width:76px}
.tbs.last{border-right:none;flex:1;flex-direction:row;align-items:center;justify-content:flex-end;gap:7px;padding-right:185px}
.tl{font-size:7px;color:var(--dim);letter-spacing:2px;margin-bottom:1px}
.tv{font-family:var(--head);font-size:11px;color:var(--acc);letter-spacing:1px}
.tv.lg{font-size:13px;color:#e8c060}
.wbadge{background:rgba(200,22,48,.14);border:1px solid rgba(200,22,48,.4);color:#ff6878;font-size:7px;padding:2px 7px;letter-spacing:1px;animation:wbp 2s ease-in-out infinite}
@keyframes wbp{0%,100%{opacity:1}50%{opacity:.5}}
/* SIDE PANEL */
#sp{position:fixed;left:0;top:44px;width:280px;height:calc(100vh - 44px);background:var(--panel);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:900}
#ph{padding:12px 13px;border-bottom:1px solid var(--border);background:rgba(0,0,0,.28);flex-shrink:0;min-height:84px}
.po{font-size:7px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.pn{font-family:var(--head);font-size:13px;color:#ddeeff;letter-spacing:1px;line-height:1.25;margin-bottom:5px}
.ptags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:7px;letter-spacing:1.5px;padding:2px 6px;border:1px solid}
.tag-own{color:#4ce870;border-color:#186030;background:rgba(76,232,112,.07)}
.tag-war{color:#ff4858;border-color:#681020;background:rgba(255,72,88,.07)}
.tag-ally{color:#48a8ff;border-color:#184888;background:rgba(72,168,255,.07)}
.tag-neut{color:var(--acc);border-color:var(--acc3);background:var(--acc2)}
.tag-enc{color:#ff2838;border-color:#781020;background:rgba(255,40,56,.1);animation:ep 1s ease-in-out infinite alternate}
.tag-fog{color:var(--dim);border-color:#1e3040}
.tag-hos{color:#e8a040;border-color:#785020;background:rgba(232,160,64,.07)}
@keyframes ep{from{opacity:1}to{opacity:.4}}
#pb{flex:1;overflow-y:auto;padding:11px 12px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
#pb::-webkit-scrollbar{width:3px}
#pb::-webkit-scrollbar-thumb{background:var(--border2)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.sc{background:rgba(255,255,255,.03);border:1px solid var(--border);padding:7px 9px}
.sl{font-size:7px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.sv{font-family:var(--head);font-size:16px;color:var(--txt)}
.sv.fog{color:var(--dim);font-size:10px;letter-spacing:4px}
.sdiv{font-size:7px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin:10px 0 7px;display:flex;align-items:center;gap:6px}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border)}
.pow-bar{text-align:center;margin:4px 0 11px}
.pn2{font-family:var(--head);font-size:24px;color:var(--acc)}
.ps{font-size:7px;color:var(--dim);letter-spacing:2px;margin-top:1px}
.bgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:6px}
.bgrid2{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:5px}
.btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--dim);padding:7px 3px;cursor:pointer;font-family:var(--font);font-size:8px;text-align:center;line-height:1.6;transition:.15s}
.btn:hover{border-color:var(--acc);color:var(--txt);background:var(--acc2)}
.btn.on{border-color:var(--acc);background:var(--acc2);color:var(--acc)}
.abtn{width:100%;background:rgba(20,40,60,.5);border:1px solid var(--border2);color:var(--txt);padding:8px;cursor:pointer;font-family:var(--font);font-size:8.5px;letter-spacing:.5px;margin-bottom:4px;transition:.15s;text-align:left}
.abtn:hover{background:var(--acc2);border-color:var(--acc);color:var(--acc)}
.abtn.red{color:#ff7080;border-color:#481020;background:rgba(200,22,48,.08)}
.abtn.red:hover{background:rgba(200,22,48,.2);border-color:#c81630}
.abtn.pulse{animation:ap .7s ease-in-out infinite alternate}
@keyframes ap{from{background:rgba(200,22,48,.08)}to{background:rgba(200,22,48,.28);border-color:#c81630}}
.dbtn{background:rgba(24,72,176,.1);border:1px solid rgba(24,72,176,.3);color:#6898e0;padding:8px 4px;cursor:pointer;font-family:var(--font);font-size:8px;text-align:center;line-height:1.6;transition:.15s}
.dbtn:hover{background:rgba(24,72,176,.2);border-color:#4878d0;color:#a0c8ff}
.dbtn:disabled{opacity:.2;cursor:not-allowed}
.dbtn.war{color:#ff6070;border-color:rgba(180,20,40,.4);background:rgba(180,20,40,.08)}
.dbtn.war:hover{background:rgba(180,20,40,.2);border-color:#c81630}
.dbtn.full{grid-column:span 2;background:var(--acc2);border-color:var(--acc3);color:var(--acc)}
.dbtn.full:hover{background:rgba(200,162,72,.22);border-color:var(--acc)}
/* MAP */
#vp{position:fixed;left:280px;top:44px;right:0;bottom:76px;overflow:hidden;cursor:grab;background:#02080e}
#vp.dragging{cursor:grabbing}
#mi{transform-origin:0 0;will-change:transform;line-height:0}
#svg-host{display:block;line-height:0}
#svg-host svg{display:block}
/* Territory classes */
.t-own{cursor:pointer;transition:filter .12s}
.t-own:hover{filter:brightness(1.45) drop-shadow(0 0 4px rgba(200,162,72,.4))!important}
.t-sel{stroke:#c8a248!important;stroke-width:2.5!important;filter:drop-shadow(0 0 9px rgba(200,162,72,.85)) brightness(1.2)!important;vector-effect:non-scaling-stroke!important}
.t-hl-atk{stroke:#ff3050!important;stroke-width:2.2!important;vector-effect:non-scaling-stroke!important;animation:hlp .75s ease-in-out infinite alternate!important;cursor:crosshair!important}
@keyframes hlp{from{filter:brightness(1.1)}to{filter:brightness(1.65) drop-shadow(0 0 8px #ff3050)}}
.t-hl-mov{stroke:#28c8ff!important;stroke-width:1.5!important;vector-effect:non-scaling-stroke!important;cursor:crosshair!important}
.t-enc{stroke:#ff0820!important;stroke-width:1.8!important;vector-effect:non-scaling-stroke!important;animation:enc 1.2s ease-in-out infinite alternate!important}
@keyframes enc{from{filter:none}to{filter:drop-shadow(0 0 8px #ff0020)}}
.fog-h{filter:grayscale(90%) brightness(.22)!important}
.fog-s{filter:grayscale(20%) brightness(.58)!important}
/* LOG */
#log{position:fixed;left:280px;right:0;bottom:0;height:76px;background:rgba(5,10,14,.97);border-top:1px solid var(--border);padding:6px 13px;z-index:800}
#lhdr{font-size:7px;color:var(--dim);letter-spacing:2px;margin-bottom:3px}
#llist{height:52px;overflow:hidden;display:flex;flex-direction:column-reverse;gap:1px}
.le{font-size:8px;color:var(--dim);padding-left:9px;position:relative;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.le::before{content:'>';position:absolute;left:0;color:var(--acc3)}
.lw{color:#e06070}.lk{color:#68e888}.ld{color:#68a8e8}.lt{color:var(--acc)}.lai{color:#b09038}
/* CONTROLS */
#nxt{position:fixed;right:14px;bottom:88px;background:#480a14;border:1px solid #681820;color:#fff;padding:9px 22px;font-family:var(--head);font-size:9px;letter-spacing:2px;cursor:pointer;z-index:1000;transition:.2s}
#nxt:hover{background:#6a1020;border-color:#c81630;box-shadow:0 0 16px rgba(200,22,48,.5)}
#mode-ind{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:90px;background:rgba(200,22,48,.92);border:1px solid #c81630;color:#fff;padding:5px 16px;font-size:8px;letter-spacing:2px;z-index:1100;pointer-events:none;animation:mp .7s ease-in-out infinite alternate}
@keyframes mp{from{box-shadow:0 0 8px rgba(200,22,48,.3)}to{box-shadow:0 0 20px rgba(200,22,48,.8)}}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center}
#modal.open{display:flex}
#mbox{background:#080f1a;border:1px solid var(--border2);width:490px;max-width:94vw;max-height:90vh;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.mt{font-family:var(--head);font-size:12px;color:var(--acc);letter-spacing:2px;margin-bottom:2px}
.ms{font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.minfo{font-size:8.5px;color:#b0c8e0;padding:9px;border:1px solid var(--border);margin:9px 0;line-height:1.9}
.slrow{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.sllbl{font-size:8px;color:var(--dim);min-width:72px}
.slrow input[type=range]{flex:1;accent-color:var(--acc);height:3px}
.slval{min-width:30px;text-align:right;color:var(--acc);font-family:var(--head);font-size:11px}
.mres{display:none;margin:9px 0;padding:8px;font-size:8.5px;line-height:1.8;border:1px solid}
.mres.ok{color:#70e890;border-color:#186028;background:rgba(70,200,80,.06)}
.mres.no{color:#ff7080;border-color:#581018;background:rgba(255,80,96,.06)}
.mres.info{color:#78b8e8;border-color:#183868;background:rgba(80,120,200,.06)}
.mbtns{display:flex;gap:6px;margin-top:13px}
.mb{flex:1;padding:8px;font-family:var(--font);font-size:8px;cursor:pointer;border:1px solid;transition:.15s;letter-spacing:1px}
.mb.ok{background:var(--acc2);border-color:var(--acc3);color:var(--acc)}
.mb.ok:hover{background:rgba(200,162,72,.22);border-color:var(--acc)}
.mb.cl{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--dim)}
.mb.cl:hover{background:rgba(255,255,255,.07);border-color:var(--border2)}
.mb.neg{background:rgba(200,22,48,.1);border-color:rgba(200,22,48,.3);color:#ff8090}
.pstat{display:flex;justify-content:space-between;margin-bottom:5px;font-size:8.5px}
.pstat .pk{color:var(--dim)}.pstat .pv{color:var(--txt);font-family:var(--head);font-size:10px}
.vpdisp{text-align:center;margin:9px 0}
.vpn{font-family:var(--head);font-size:34px;color:var(--acc)}
.vpl{font-size:7px;color:var(--dim);letter-spacing:2px}
.lbar{margin:9px 0}
.lb-lbl{font-size:7.5px;color:var(--dim);margin-bottom:4px;display:flex;justify-content:space-between}
.lb-track{height:3px;background:var(--border)}
.lb-fill{height:100%;background:var(--acc);transition:width .3s}
.mchk{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:8.5px;cursor:pointer}
.mchk input{accent-color:var(--acc);width:12px;height:12px}
.demrow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.demrow input{accent-color:#c81630;width:12px;height:12px}
.demrow label{font-size:8.5px;color:#c0d0e0;cursor:pointer}
.tsel{background:var(--panel);border:1px solid var(--border2);color:var(--txt);font-family:var(--font);font-size:8.5px;padding:4px 7px;width:100%;margin-bottom:6px;cursor:pointer}
.tsel option{background:#091420}
.mcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.mch{font-size:7px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.mdi{font-size:8.5px;color:#b0c8e0;padding:4px 0;border-bottom:1px solid var(--border);line-height:1.5}
.mdi:last-child{border-bottom:none}
/* Loading */
#loading{position:fixed;inset:0;background:#02080e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9990}
#loading.done{display:none}
.ld-t{font-family:var(--head);font-size:20px;color:var(--acc);letter-spacing:3px;margin-bottom:18px}
.ld-bar{width:320px;height:2px;background:var(--border);margin-bottom:10px}
.ld-fill{height:100%;background:var(--acc);width:0%;transition:width .3s}
.ld-s{font-size:8px;color:var(--dim);letter-spacing:2px}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-t">WORLD COMMAND 1936</div>
  <div class="ld-bar"><div class="ld-fill" id="ldf"></div></div>
  <div class="ld-s" id="lds">LOADING MAP...</div>
</div>

<div id="tb">
  <div class="tbs"><div class="tl">FACTION</div><div class="tv lg">JAPAN — 大日本帝国</div></div>
  <div class="tbs"><div class="tl">TREASURY</div><div class="tv">Y<span id="tb-m">2000</span></div></div>
  <div class="tbs"><div class="tl">INCOME</div><div class="tv" id="tb-i" style="color:#68d888">+0</div></div>
  <div class="tbs"><div class="tl">TERRITORIES</div><div class="tv" id="tb-t">0</div></div>
  <div class="tbs"><div class="tl">DATE</div><div class="tv" id="tb-d">1936.01</div></div>
  <div class="tbs last" id="tb-wars"></div>
</div>

<div id="sp">
  <div id="ph">
    <div class="po" id="ph-o">— SELECT TERRITORY —</div>
    <div class="pn" id="ph-n">地域を選択してください</div>
    <div class="ptags" id="ph-t"></div>
  </div>
  <div id="pb"><div id="pcontent" style="color:var(--dim);font-size:8.5px;text-align:center;padding:40px 12px;line-height:2.4">WORLD MAP 1936<br>CLICK TERRITORY<br><span style="font-size:7px;letter-spacing:1px">OWN = RECRUIT / ATTACK<br>ENEMY = DIPLOMACY</span></div></div>
</div>

<div id="vp"><div id="mi"><div id="svg-host"></div></div></div>
<div id="mode-ind">TARGET SELECTION MODE</div>
<button id="nxt" onclick="nextTurn()">NEXT TURN &#9654;</button>

<div id="log">
  <div id="lhdr">OPERATIONS LOG — IMPERIAL GENERAL HEADQUARTERS</div>
  <div id="llist"></div>
</div>

<div id="modal">
  <div id="mbox">
    <div class="mt" id="m-title">DIPLOMACY</div>
    <div class="ms" id="m-sub">---</div>
    <div id="m-body"></div>
    <div class="mres" id="m-res"></div>
    <div class="mbtns" id="m-btns">
      <button class="mb cl" onclick="closeModal()">CANCEL</button>
      <button class="mb ok" onclick="execModal()">EXECUTE</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════════
//  1936 FACTION ASSIGNMENT
//  Based on actual MapChart_Map.svg territory IDs
// ══════════════════════════════════════════════════════════════════
const JP_IDS = new Set([
  // Home islands
  'Hokkaido','Kita-Tohoku','Minami-Tohoku','Kanto','Koshinetsu','Hokuriku',
  'Tokai',"San'in","San'yo",'Kansai','Shikoku','Kitakyūshū','Minami_Kyūshū','Okinawa',
  // Korea
  'Hamgyong','Pyongan-Hwanghae','Gangwon','Gyeonggi','Chungcheong-Jeolla','Gyeongsang',
  // Manchukuo + controlled regions
  'Heilungkiang','Kirin','Liaoning','Liaobei','Jehol','East_Hebei','Hebei-Chahar',
  // Taiwan + South Sakhalin
  'Taiwan','South_Sakhalin',
  // Pacific mandates
  'Saipan','Caroline_Islands','Marshall_Islands','Palau','Marcus_Island','Iwo_Jima','Kuril_Islands',
  // Leased territory
  'Dalian',
]);

const SU_IDS = new Set([
  // European Russia
  'Leningrad','Moscow','Novgorod','Yaroslavl','Ivanovo','Gorky','Rzhev',
  'Smolensk','Bryansk','Orel','Kursk','Voronezh','Stalingrad','Astrakhan',
  'Kuybyshev','Saratov','Penza','Ryazan','Tula','Lipetsk','Tambov','Millerovo',
  'Kazan','Kirov','Ufa','Orenburg','Chelyabinsk','Sverdlovsk','Perm','Zlatoust',
  'Magnitogorsk','Murmansk','Arkhangelsk','Vologda','Onega','Kargopol',
  'Kotlas','Syktyvkar','Pechora','Nenets','Balakovo',
  // Ukraine
  'Kyiv','Zhytomyr','Vinnytsia','Poltava','Kharkov','Stalino','Dnipropetrovsk',
  'Zaporozhe','Kherson','Mykolaiv','Odessa','Sumy','Cherkasy','Chernigov',
  'Volgodonsk','Nikolayevsk',
  // Belarus
  'Minsk','Bobruysk','Gomel','Vitebsk','Mozyr','Balta_Tiraspol',
  // Caucasus
  'Georgia','Azerbaijan','Armenia','Krasnodar','Sochi','Stavropol','Rostov',
  'Kabardino_Balkaria','North_Ossetia','Chechnya_Ingushetia','Dagestan','Kalmykia',
  // Central Asia
  'Tashkent','Ashkhabad','Bukhara','Khiva','Tashauz','Navoi','Stalinabad',
  'Alma_Ata','Kyzyl_Orda','Ayaguz','Pavlodar','Semipalatinsk','Karagandy',
  'Guryev',"Ural'sk",'Karakalpakstan','Akmolinsk','Kostanay',
  // Siberia
  'Omsk','Novosibirsk','Tomsk','Altai_Krai','Oyrot_Region','Krasnoyarsk',
  'Yeniseisk','Irkutsk','Buryatia','Chita','Birobidzhan','Amur','Khabarovsk',
  'Vladivostok','North_Sakhalin','Kamchatka','Chukotka','Chukchi_Peninsula',
  'Okhotsk','Magadan','Kolyma','Yakutsk','Verkhoyansk','Udachny','Dudinka',
  'Salekhard','Yamalia','Khatangsky','Bodaybo','Kirensk','Bratsk','Tobolsk',
  'Tyumen','Surgut','Norilsk','Akhtubinsk','Udmurtia','Chuvashia','Mari_El',
  'Mordovia','Balakovo','Ulyanovsk','Izhevsk',
  // Mongolia (Soviet-controlled)
  'Ulaanbaatar','Khovd','Khövsgöl','Dornod','Tannu_Tuva',
  // Baltic (Soviet in 1939 but free in 1936 — keeping Soviet for game balance)
  'Harju','Virumaa','Tartu','Pärnu','Saaremaa',  // Estonia
  'Rīga','Vidzeme','Latgale','Kurzeme','Zemgale',  // Latvia
  'Kaunas','Aukštaitija','Žemaitija','Sūduva','Klaipeda',  // Lithuania
]);

const CN_IDS = new Set([
  // Core China (Nationalist-controlled 1936)
  'Shanxi','Shaanbei','Shandong','Henan','Hubei','Hunan','Jiangsu','Jiangxi',
  'Zhejiang','Anhui','Fujian','Guangdong','Guangxi','Yunnan','Guizhou',
  'Sichuan','Gansu','Qinghai','Ningxia','Suiyuan','Chahar',
  // Tibet and western regions
  'Tibet','Chamdo','Ngari','Shigatse','Nagqu','Golog','Gannan','Ganzi','Liangshan',
  // Xinjiang
  'Xinjiang','Dzungaria','Taklamakan','Yarkand','Khotan','Urumqi','Dabancheng',
  'Jiuquan','Wuwei','Haixi','Alxa','Ordos','Xilingol','Hulunbuir','Pailingmiao',
  // Cities
  'Nanjing','Shanghai','Beiping','Wuhan','Chongqing','Chengdu','Guangzhou',
  'Nanning','Nanlu','Changde','Jinan','Qingdao','Suzhou','Guyuan','Yulin',
  'Xian','Dali','Yan\'an','Zunyi','Guangzhouwan','Hainan',
  // Inner Mongolia (under Chinese nominal control)
  'Gobi','Kunlun_Shan',
]);

const GE_IDS = new Set([
  // Germany proper
  'Brandenburg','Sachsen','Thüringen','Hannover','Westfalen','Rhineland','Moselland',
  'Hessen','Weser_Ems','Holstein','Schleswig','Mecklenburg','Vorpommern','Hinterpommern',
  'Oberbayern','Niederbayern','Franken','Württemberg','Baden','Oberschlesien',
  'Niederschlesien','Ermland_Masuren','Danzig',
  // Austria (Anschluss not yet, but grouped for gameplay)
  'Ostmark','Tyrol','Vorarlberg','Steiermark_Kärnten','Oberösterreich','Niederösterreich',
  'Burgenland',
  // Italy (Axis partner)
  'Piemonte','Lombardia','Veneto','Emilia_Romagna','Toscana','Lazio','Campania',
  'Calabria','Puglia','Abruzzo','Sardegna','Sicilia','Trentino','Alto_Adige',
  'Litorale','Istria','Zara','Dodecanese',
  // Italian colonies
  'Tripolitania','Cyrenaica','Sirte','Libyan_Desert','Eritrea','Somaliland',
  // Italian East Africa (Abyssinia - partially conquered 1936)

function getEco(id, own) {
  if(ECO_BONUS[id]) return ECO_BONUS[id];
  // Base by faction type
  const bases = {jp:15,su:12,cn:10,ge:16,al:12,nt:7};
  return (bases[own]||7) + Math.floor(Math.random()*12);
}

function getFaction(id) {
  if(JP_IDS.has(id)) return 'jp';
  if(SU_IDS.has(id)) return 'su';
  if(CN_IDS.has(id)) return 'cn';
  if(GE_IDS.has(id)) return 'ge';
  if(AL_IDS.has(id)) return 'al';
  return 'nt';
}

function getInitUnits(own) {
  const base = {jp:{i:22,t:6,a:5},su:{i:18,t:5,a:3},cn:{i:14,t:2,a:2},
                ge:{i:20,t:7,a:4},al:{i:15,t:4,a:3},nt:{i:8,t:0,a:1}};
  const b = base[own]||{i:5,t:0,a:0};
  const r = ()=>Math.floor(Math.random()*7)-3;
  return {i:Math.max(1,b.i+r()), t:Math.max(0,b.t+r()), a:Math.max(0,b.a+r())};
}

function relKey(a,b){return[a,b].sort().join('-')}
function getRel(a,b){return G.rel[relKey(a,b)]||'peace'}
function setRel(a,b,v){G.rel[relKey(a,b)]=v;updateTopbar()}
function isWar(a,b){return getRel(a,b)==='war'}
function calcAtk(u){return u.i*US.i.atk+u.t*US.t.atk}
function calcDef(u){return u.i*US.i.def+u.t*US.t.def+u.a*US.a.def}
function calcPow(u){return Math.round(calcAtk(u)+calcDef(u))}
function income(f){let s=0;for(const t of Object.values(S))if(t.own===f)s+=t.eco;return s}
function ownCount(f){let c=0;for(const t of Object.values(S))if(t.own===f)c++;return c}
function totPow(f){let s=0;for(const t of Object.values(S))if(t.own===f)s+=calcPow(t.u);return s}

// IDs to skip (non-territory elements)
const SKIP_IDS = new Set([
  'wrapper','svg-background','map-group','map','legend-bg-rect-svg',
  'legend-g-svg','legend-svg','credit-text-svg','credit-tspan-svg',
  '1273','13313','4435',

function isTerrId(id){
  if(!id||SKIP_IDS.has(id)) return false;
  if(/^(pattern|diagonal|vertical|horizontal|crosshatch|checkers|texture|circles|raindrops|subtlepatch)/.test(id)) return false;
  if(/_[0-9a-f]{6}_/.test(id)) return false;
  return true;
}

function injectSVG(svgText){
  const host = document.getElementById('svg-host');
  host.innerHTML = svgText;
  const svgEl = host.querySelector('svg');
  if(!svgEl) return;
  // Remove fixed dimensions, let CSS control
  svgEl.removeAttribute('width');
  svgEl.removeAttribute('height');
  svgEl.style.cssText = 'width:100%;height:auto;display:block';

  svgEl.querySelectorAll('[id]').forEach(el => {
    const id = el.getAttribute('id');
    if(!isTerrId(id)) return;
    const own = getFaction(id);
    const eco = getEco(id, own);
    const u = getInitUnits(own);

    // Apply faction color
    el.setAttribute('fill', FAC_COLOR[own]);
    el.style.cursor = 'pointer';
    el.classList.add('t-own');
    el.addEventListener('click', e => { e.stopPropagation(); onTerrClick(id); });

    S[id] = { el, name:id.replace(/_/g,' '), own, eco, u };
  });
}

// ══════════════════════════════════════════════════════════════════
//  ADJACENCY via getBoundingClientRect
// ══════════════════════════════════════════════════════════════════
function buildAdj(){
  const ids = Object.keys(S);
  const rects = {};
  for(const id of ids){
    const el = S[id].el;
    if(el) rects[id] = el.getBoundingClientRect();
  }
  const PAD = 3; // pixel tolerance for touching borders
  for(let i=0;i<ids.length;i++){
    const a=ids[i]; const ra=rects[a]; if(!ra||ra.width<1) continue;
    if(!ADJ[a]) ADJ[a]=new Set();
    for(let j=i+1;j<ids.length;j++){
      const b=ids[j]; const rb=rects[b]; if(!rb||rb.width<1) continue;
      if(!(ra.right<rb.left-PAD||ra.left>rb.right+PAD||
           ra.bottom<rb.top-PAD||ra.top>rb.bottom+PAD)){
        if(!ADJ[a]) ADJ[a]=new Set();
        if(!ADJ[b]) ADJ[b]=new Set();
        ADJ[a].add(b); ADJ[b].add(a);
      }
    }
  }
}
function adjList(id){return ADJ[id]?[...ADJ[id]]:[]}

// ══════════════════════════════════════════════════════════════════
//  FOG OF WAR
// ══════════════════════════════════════════════════════════════════
function getVis(){
  const vis=new Set();
  for(const[id,t]of Object.entries(S)){
    if(t.own==='jp') vis.add(id);
    if(getRel('jp',t.own)==='allied') vis.add(id);
  }
  for(const id of [...vis]) for(const adj of adjList(id)) vis.add(adj);
  return vis;
}
function applyFoW(){
  const vis=getVis();
  for(const[id,t]of Object.entries(S)){
    const el=t.el; if(!el) continue;
    el.classList.remove('fog-h','fog-s','t-enc');
    if(t.own==='jp') {}
    else if(vis.has(id)) el.classList.add('fog-s');
    else el.classList.add('fog-h');
    if(t.own!=='jp'&&vis.has(id)&&isEnc(id)) el.classList.add('t-enc');
  }
}
function isEnc(id){
  const t=S[id]; if(!t) return false;
  for(const aj of adjList(id)){
    const a=S[aj]; if(!a) continue;
    if(a.own===t.own) return false;
    if(getRel(t.own,a.own)==='allied') return false;
  }
  // Only "encircled" if has any neighbors at all
  return adjList(id).length > 0;
}

// ══════════════════════════════════════════════════════════════════
//  MOVEMENT BFS
// ══════════════════════════════════════════════════════════════════
function getReachable(fromId,maxRange){
  const vis=new Map([[fromId,0]]);
  const q=[[fromId,0]];
  const atk=new Set(), mov=new Set([fromId]);
  while(q.length){
    const[id,d]=q.shift();
    if(d>=maxRange) continue;
    for(const nId of adjList(id)){
      if(vis.has(nId)) continue;
      const nt=S[nId]; if(!nt) continue;
      vis.set(nId,d+1);
      const friendly = nt.own==='jp'||getRel('jp',nt.own)==='allied';
      if(friendly){mov.add(nId);q.push([nId,d+1]);}
      else atk.add(nId);
    }
  }
  return{atk,mov};
}
function getBombTargets(fromId){
  const t=new Set();
  for(const aj of adjList(fromId)){
    const a=S[aj];
    if(a&&a.own!=='jp'&&getRel('jp',a.own)!=='allied') t.add(aj);
  }
  return t;
}

      <button class="dbtn" onclick="openDiplo('aid','${id}')">援助<br>AID</button>
      <button class="dbtn" onclick="openDiplo('guarantee','${id}')">独立保障<br>GUARANTEE</button>
      <button class="dbtn" onclick="openDiplo('puppet','${id}')">傀儡化<br>PUPPET</button>`;
    } else {
      html+=`<button class="dbtn" disabled>同盟 (交戦中)</button>
      <button class="dbtn" disabled>援助 (交戦中)</button>
      <button class="dbtn war" onclick="openPeace('${id}')">講和<br>PEACE</button>
      <button class="dbtn" disabled>傀儡化 (交戦中)</button>`;
    }
    html+=`<button class="dbtn full" onclick="openNegot('${id}')">GIVE & TAKE — 外交交渉</button></div>`;

    // Quick attack shortcut from last own territory
    const lo=G.lastOwnSel;
    if(lo&&S[lo]?.own==='jp'){
      const{atk:a2}=getReachable(lo,US.i.range);
      const{atk:a3}=getReachable(lo,US.t.range);
      if(a2.has(id)||a3.has(id)){
        const mode=a2.has(id)?'assault':'tankrush';
        html+=`<div class="sdiv">QUICK ATTACK</div>
        <button class="abtn red" onclick="showAtkModalDirect('${lo}','${id}','${mode}')">
          [${mode==='assault'?'ASSAULT':'TANK RUSH'}] ${S[lo].name} → ${t.name}
        </button>`;
      }
    }
  }
  pc.innerHTML=html;
}

}

  G.atkMode=mode; G.atkFrom=fid;

  if(mode==='bombard') atkSet=getBombTargets(fid);
  else{
    const range=mode==='tankrush'?US.t.range:US.i.range;

function updAtkPrev(){
  const at=S[_af]; if(!at) return;

  const st=Math.max(0,Math.floor(at.u.t*p));

  let ap=_am==='tankrush'?st*US.t.atk+si*US.i.atk*.3:si*US.i.atk+st*US.t.atk;

  if(el) el.innerHTML=`派遣: [I]${si} [T]${st} [A]${sa} | 攻撃力: <span style="color:var(--acc);font-family:var(--head)">${Math.round(ap)}</span>`;

function execAttack(fid,tid,mode){
  const at=S[fid],df=S[tid];
  if(!at||!df||at.own!=='jp'||df.own==='jp') return;
  const range=mode==='tankrush'?US.t.range:US.i.range;
  const{atk}=getReachable(fid,range);
  if(!atk.has(tid)){logMsg(`${df.name}は射程外です。`,'lw');return}
  if(!isWar('jp',df.own)){
    setRel('jp',df.own,'war');
    const wk=relKey('jp',df.own);
    G.warCaptures[wk]=G.warCaptures[wk]||[];
    logMsg(`[宣戦布告] 大日本帝国 → ${FAC_NAME[df.own]}`,'lw');
  }
  const p=G.sendPct/100;
  const si=Math.max(1,Math.floor(at.u.i*p));
  const st=Math.max(0,Math.floor(at.u.t*p));
  const sa=Math.max(0,Math.floor(at.u.a*p));
  let ap=mode==='tankrush'?st*US.t.atk+si*US.i.atk*.3:si*US.i.atk+st*US.t.atk;
  ap+=sa*.5; ap*=(.78+Math.random()*.44);
  const enc=isEnc(tid);
  let dp=calcDef(df.u)*(enc?.5:1)*(.78+Math.random()*.44);
  if(enc) logMsg(`[包囲殲滅] ${df.name}: 防御力-50%`,'lt');
  at.u.i=Math.max(0,at.u.i-Math.floor(dp*.14));
  at.u.t=Math.max(0,at.u.t-Math.floor(dp*.05));
  if(ap>dp){
    const prev=df.own;
    df.own='jp'; df.u={i:si,t:st,a:sa};
    at.u.i=Math.max(0,at.u.i-si); at.u.t=Math.max(0,at.u.t-st);
    df.el.setAttribute('fill', FAC_COLOR.jp);
    df.el.classList.remove('fog-h','fog-s','t-enc');
    const wk=relKey('jp',prev);
    (G.warCaptures[wk]=G.warCaptures[wk]||[]).push({id:tid,prev});
    logMsg(`[占領] ${df.name}を占領！ ATK:${Math.round(ap)} vs DEF:${Math.round(dp)}`,'lk');
    checkDefeated(prev);
  } else {
    df.u.i=Math.max(0,df.u.i-Math.floor(df.u.i*.13));
    logMsg(`[失敗] ${df.name}への攻撃失敗。ATK:${Math.round(ap)} vs DEF:${Math.round(dp)}`,'lw');
  }
  applyFoW(); updateTopbar(); if(G.sel) updatePanel(G.sel);
}
function execBombard(fid,tid){
  const at=S[fid],df=S[tid];
  if(!at||!df||at.own!=='jp') return;
  if(!adjList(fid).includes(tid)){logMsg('砲兵射程外（隣接のみ）','lw');return}
  if(at.u.a<=0){logMsg(`${at.name}に砲兵がいません`,'lw');return}
  const dmg=Math.max(1,Math.floor(at.u.a*2*(.7+Math.random()*.6)));
  df.u.i=Math.max(0,df.u.i-Math.floor(dmg*.7));
  df.u.t=Math.max(0,df.u.t-Math.floor(dmg*.1));
  logMsg(`[砲撃] ${at.name}→${df.name}: ${dmg}ダメージ`,'lt');
  cancelAtk(); if(G.sel) updatePanel(G.sel);
}
function checkDefeated(fac){
  if(fac==='jp') return;
  const rem=Object.values(S).filter(t=>t.own===fac);
  if(rem.length===0) logMsg(`[降伏] ${FAC_NAME[fac]}が降伏！全領土を占領。`,'lk');
}

let _mT,_mId;
function aiAccept(type,id,offer){
  const t=S[id],fac=t.own;
  const r=totPow('jp')/Math.max(1,totPow(fac));
  const aid=offer?.money||0;
  let p=0.35;
  switch(type){
    case 'alliance': p=fac==='nt'?0.45:0.18;p+=aid/600;break;
    case 'guarantee':p=r>1.3?0.58:0.35;p+=aid/450;break;
    case 'puppet':   p=r>2.8?0.52:0.05;p+=aid/350;break;
    case 'peace':    const tr=totPow(fac)/Math.max(1,totPow('jp'));p=tr<0.5?0.82:tr<0.8?0.55:0.22;p+=aid/700;break;
  }
  return Math.random()<Math.min(.92,Math.max(.03,p));
}
function openDiplo(type,id){
  _mT=type;_mId=id;
  const t=S[id];
  const titles={alliance:'同盟交渉',aid:'資金援助',guarantee:'独立保障',puppet:'保護国化'};
  const infos={
    alliance:'相互防衛同盟を提案します。成立後は互いへの攻撃に自動参戦します。',
    aid:'資金を提供して外交関係を改善します。',
    guarantee:'対象国が攻撃された場合、日本が自動参戦することを宣言します。',
    puppet:'対象国を属国化します。国力差が判定に大きく影響します。',
  };
  const maxAid=Math.min(G.money,800);
  document.getElementById('m-title').textContent=titles[type];
  document.getElementById('m-sub').textContent=`交渉相手: ${t.name} / ${FAC_NAME[t.own]}`;
  document.getElementById('m-res').style.display='none';
  document.getElementById('m-res').className='mres';
  document.getElementById('m-body').innerHTML=`
    <div class="minfo">${infos[type]}</div>
    <div class="sdiv">OFFER / 提供条件</div>
    <div class="slrow">
      <span class="sllbl">金銭援助 Y</span>
      <input type="range" min="0" max="${maxAid}" step="50" value="0" id="sl-aid"
        oninput="document.getElementById('av').textContent=this.value">
      <span class="slval" id="av">0</span>
    </div>`;
  document.getElementById('m-btns').innerHTML=`
    <button class="mb cl" onclick="closeModal()">CANCEL</button>
    <button class="mb ok" onclick="execDiplo()">EXECUTE</button>`;
  document.getElementById('modal').classList.add('open');
}
function execDiplo(){
  const type=_mT,id=_mId,t=S[id];
  const aid=parseInt(document.getElementById('sl-aid')?.value||0);
  if(aid>G.money){showMRes('資金不足。',false);return}
  if(type==='guarantee'){G.guarantees.add(id);logMsg(`[独立保障] ${t.name}の独立を保障。`,'ld');showMRes('独立保障を宣言しました。',true);return}
  if(type==='aid'){G.money-=aid;logMsg(`[援助] ${t.name}にY${aid}援助。`,'ld');showMRes(`Y${aid}援助完了。`,true);updateTopbar();return}
  if(aiAccept(type,id,{money:aid})){
    G.money-=aid;
    if(type==='alliance'){setRel('jp',t.own,'allied');logMsg(`[同盟] ${FAC_NAME[t.own]}と同盟締結。`,'ld');showMRes('同盟条約締結。相互防衛義務が発生します。',true)}
    else if(type==='puppet'){t.own='jp';t.el.setAttribute('fill',FAC_COLOR.jp);applyFoW();logMsg(`[傀儡化] ${t.name}を保護国化。`,'lk');showMRes(`${t.name}は日本の保護国となりました。`,true)}
    updateTopbar();if(G.sel) updatePanel(G.sel);
  } else {
    logMsg(`[外交失敗] ${t.name}との交渉失敗。`,'lw');
    showMRes('提案は拒否されました。援助増額か軍事的優位性の強化が必要です。',false);
  }
}

// GIVE & TAKE
function openNegot(id){
  _mT='negot';_mId=id;
  const t=S[id];
  const demands=genDemands(id);
  G.negot={id,fac:t.own,round:1,max:3,deadline:G.turn+4,demands};
  renderNegot(demands);
  document.getElementById('modal').classList.add('open');
}
function genDemands(id){
  const t=S[id],fac=t.own;
  const inc=income(fac),ratio=totPow('jp')/Math.max(1,totPow(fac));
  return{money:Math.ceil(inc*(ratio>1.5?.6:ratio>1?.9:1.3)*(.8+Math.random()*.4)/50)*50,
         nonagg:ratio<0.9,peace:isWar('jp',fac)};
}
function renderNegot(d){
  const id=_mId,t=S[id],n=G.negot;
  const maxO=Math.min(G.money,1200);
  const ownTerrs=Object.entries(S).filter(([,s])=>s.own==='jp')
    .map(([sid,s])=>`<option value="${sid}">${s.name}</option>`).join('');
  document.getElementById('m-title').textContent='外交交渉 — GIVE & TAKE';
  document.getElementById('m-sub').textContent=`${t.name} / ${FAC_NAME[t.own]}  |  Round ${n.round}/${n.max}  期限:Turn ${n.deadline}`;
  document.getElementById('m-res').style.display='none';
  document.getElementById('m-res').className='mres';
  document.getElementById('m-body').innerHTML=`
    <div class="mcols">
      <div>
        <div class="mch">YOUR OFFER / 日本の提示</div>
        <div class="slrow"><span class="sllbl">金銭 Y</span>
          <input type="range" min="0" max="${maxO}" step="50" value="0" id="n-m"
            oninput="document.getElementById('n-mv').textContent=this.value;updNBar()">
          <span class="slval" id="n-mv">0</span></div>
        <select class="tsel" id="n-t" onchange="updNBar()"><option value="">領土割譲なし</option>${ownTerrs}</select>
        <label class="mchk"><input type="checkbox" id="n-na" onchange="updNBar()"> 不可侵条約を提案</label>
        <label class="mchk"><input type="checkbox" id="n-pe" onchange="updNBar()"> 停戦を提案</label>
      </div>
      <div>
        <div class="mch">THEIR DEMANDS</div>
        ${d.money>0?`<div class="mdi">金銭: Y${d.money}</div>`:''}
        ${d.nonagg?`<div class="mdi">不可侵条約</div>`:''}
        ${d.peace?`<div class="mdi">停戦合意</div>`:''}
        ${!d.money&&!d.nonagg&&!d.peace?`<div class="mdi" style="color:var(--dim)">要求なし</div>`:''}
      </div>
    </div>
    <div class="lbar">
      <div class="lb-lbl"><span>合意可能性</span><span id="n-pct" style="font-family:var(--head);color:var(--acc)">0%</span></div>
      <div class="lb-track"><div class="lb-fill" id="n-bar" style="width:0%"></div></div>
    </div>`;
  document.getElementById('m-btns').innerHTML=`
    <button class="mb cl" onclick="closeModal()">CANCEL</button>
    <button class="mb neg" onclick="execCounter()">COUNTER</button>
    <button class="mb ok" onclick="execNegot()">SUBMIT</button>`;
  updNBar();
}
function updNBar(){
  const d=G.negot?.demands||{};
  const m=parseInt(document.getElementById('n-m')?.value||0);
  const terr=document.getElementById('n-t')?.value;
  const na=document.getElementById('n-na')?.checked;
  const pe=document.getElementById('n-pe')?.checked;
  let score=0,total=0;
  if(d.money>0){score+=Math.min(1,m/d.money)*40;total+=40}
  if(d.nonagg){score+=(na?30:0);total+=30}
  if(d.peace){score+=(pe?30:0);total+=30}
  if(terr) score+=20;
  const pct=total>0?Math.round(score/total*100):40;
  document.getElementById('n-bar').style.width=pct+'%';
  document.getElementById('n-pct').textContent=pct+'%';
}
function execNegot(){
  const n=G.negot,d=n.demands,id=_mId,t=S[id];
  const m=parseInt(document.getElementById('n-m')?.value||0);
  const terr=document.getElementById('n-t')?.value;
  const na=document.getElementById('n-na')?.checked;
  const pe=document.getElementById('n-pe')?.checked;
  let score=0,total=0;
  if(d.money>0){score+=Math.min(1,m/d.money)*40;total+=40}
  if(d.nonagg){score+=(na?30:0);total+=30}
  if(d.peace){score+=(pe?30:0);total+=30}
  if(terr) score+=20;
  const thresh=total>0?65:50;
  const pct=total>0?score/total*100:40;
  if(pct>=thresh){
    G.money-=m;
    if(terr&&S[terr]){S[terr].own=t.own;S[terr].el.setAttribute('fill',FAC_COLOR[t.own]);logMsg(`[交渉] ${S[terr].name}を割譲`,'ld')}
    if(na||pe) setRel('jp',t.own,'peace');
    logMsg(`[交渉成立] ${t.name}との交渉成立！`,'ld');
    showMRes(`交渉成立。(達成率 ${Math.round(pct)}% / 閾値 ${thresh}%)`,true);
    G.negot=null;updateTopbar();applyFoW();if(G.sel)updatePanel(G.sel);
  } else {
    n.round++;
    if(n.round>n.max){
      logMsg(`[交渉決裂] ${t.name}との交渉決裂。`,'lw');
      showMRes(`交渉決裂。(達成率 ${Math.round(pct)}% < 閾値 ${thresh}%)`,false);
      G.negot=null;
    } else {
      d.money=Math.ceil(d.money*.84/50)*50;
      showMRes(`条件不足。AIが要求を緩和して再交渉。Round ${n.round}/${n.max}`,false,'info');
      setTimeout(()=>{document.getElementById('m-res').style.display='none';renderNegot(d)},2100);
    }
  }
}
function execCounter(){
  const n=G.negot; n.round++;
  if(n.round>n.max){showMRes('交渉期限超過。',false);G.negot=null;return}
  n.demands.money=Math.ceil(n.demands.money*.80/50)*50;
  if(n.round>=2) n.demands.nonagg=false;
  renderNegot(n.demands);
}

// PEACE
function openPeace(id){
  _mT='peace';_mId=id;
  const t=S[id],fac=t.own;
  const jpP=totPow('jp'),facP=totPow(fac);
  const isJpWin=jpP>facP*.7;
  const wk=relKey('jp',fac);
  const caps=(G.warCaptures[wk]||[]).filter(c=>S[c.id]?.own==='jp').length;
  const vp=Math.max(1,Math.floor((jpP/Math.max(1,facP))*1.5)+caps);
  document.getElementById('m-title').textContent='講和交渉 — PEACE TREATY';
  document.getElementById('m-sub').textContent=`交戦国: ${FAC_NAME[fac]} | ${isJpWin?'日本有利':'敵方有利'}`;
  document.getElementById('m-res').style.display='none';
  document.getElementById('m-res').className='mres';
  const maxA=Math.min(G.money,800);
  document.getElementById('m-body').innerHTML=`
    <div class="vpdisp"><div class="vpn">${vp}</div><div class="vpl">VICTORY POINTS</div></div>
    <div class="minfo" style="font-size:7.5px">勝利点は戦力比と占領数から算出。高いほど有利な要求が可能です。</div>
    ${isJpWin?`<div class="sdiv">DEMANDS</div>
    ${vp>=1?`<label class="mchk"><input type="checkbox" id="d-m" checked> 賠償金 Y${vp*100}を要求</label>`:''}
    ${vp>=5?`<label class="mchk"><input type="checkbox" id="d-p"> ${FAC_NAME[fac]}の傀儡化を要求</label>`:''}
    `:`<div class="minfo" style="color:#ff8090;font-size:7.5px">不利な戦況。無条件講和のみ提案可能。</div>`}
    <div class="sdiv">ADDITIONAL</div>
    <div class="slrow"><span class="sllbl">補償金 Y</span>
      <input type="range" min="0" max="${maxA}" step="50" value="0" id="sl-pa"
        oninput="document.getElementById('pav').textContent=this.value">
      <span class="slval" id="pav">0</span></div>`;
  document.getElementById('m-btns').innerHTML=`
    <button class="mb cl" onclick="closeModal()">CANCEL</button>
    <button class="mb ok" onclick="execPeace('${id}',${isJpWin},${vp})">PROPOSE PEACE</button>`;
  document.getElementById('modal').classList.add('open');
}
function execPeace(id,isJpWin,vp){
  const t=S[id],fac=t.own;
  const aid=parseInt(document.getElementById('sl-pa')?.value||0);
  const demMon=document.getElementById('d-m')?.checked;
  const demPup=document.getElementById('d-p')?.checked;
  const wk=relKey('jp',fac);
  const tr=totPow(fac)/Math.max(1,totPow('jp'));
  let p=isJpWin?(tr<0.4?.88:tr<0.7?.62:.32):.55;
  p+=aid/1200;if(demPup)p-=.35;if(demMon)p-=.08;
  if(Math.random()<Math.min(.94,Math.max(.02,p))){
    G.money-=aid;
    if(demMon){const rep=vp*100;G.money+=rep;logMsg(`[賠償] ${FAC_NAME[fac]}よりY${rep}獲得`,'lk')}
    if(demPup){const caps=G.warCaptures[wk]||[];for(const c of caps){if(S[c.id]?.own===fac){S[c.id].own='jp';S[c.id].el.setAttribute('fill',FAC_COLOR.jp)}}}
    setRel('jp',fac,'peace');delete G.warCaptures[wk];
    logMsg(`[講和成立] ${FAC_NAME[fac]}との講和条約締結。`,'ld');
    showMRes('講和条約締結。戦争終結。',true);
    updateTopbar();applyFoW();if(G.sel)updatePanel(G.sel);
  } else {
    logMsg(`[講和拒否] ${FAC_NAME[fac]}が拒否。`,'lw');
    showMRes('講和条件を拒否されました。',false);
  }
}

function showMRes(txt,ok,cls){
  const d=document.getElementById('m-res');
  d.className='mres '+(cls||(ok?'ok':'no'));
  d.style.display='block';d.textContent=txt;
}
function closeModal(){document.getElementById('modal').classList.remove('open');_mT=null}
function execModal(){}

// ══════════════════════════════════════════════════════════════════
//  AI TURN
// ══════════════════════════════════════════════════════════════════
function aiTurn(){
  for(const fac of['cn','su','ge','al']){
    if(isWar('jp',fac)) aiFacAtk(fac,'jp');
    aiFacReinforce(fac);
  }
}
function aiFacAtk(af,df){
  let best=null,bestR=-1;
  for(const[fid,at]of Object.entries(S)){
    if(at.own!==af) continue;
    for(const aj of adjList(fid)){
      const dt=S[aj]; if(!dt||dt.own!==df) continue;
      const enc=isEnc(aj)?.5:1;
      const r=calcAtk(at.u)/(Math.max(.1,calcDef(dt.u)*enc));
      if(r>bestR){bestR=r;best={fid,tid:aj}}
    }
  }
  if(!best||bestR<0.45) return;
  const at=S[best.fid],dt=S[best.tid];
  const enc=isEnc(best.tid)?.5:1;
  const ap=calcAtk(at.u)*(.78+Math.random()*.44);
  const dp=calcDef(dt.u)*enc*(.78+Math.random()*.44);
  if(ap>dp){
    const xfer=Math.max(1,Math.floor(at.u.i*.22));
    at.u.i=Math.max(0,at.u.i-xfer);dt.own=af;dt.u={i:xfer,t:0,a:0};
    dt.el.setAttribute('fill',FAC_COLOR[af]);
    logMsg(`[AI] ${FAC_SN[af]}: ${dt.name}を占領`,'lai');applyFoW();
  } else {at.u.i=Math.max(0,at.u.i-Math.floor(at.u.i*.1))}
}
function aiFacReinforce(fac){
  let cnt=0;
  for(const t of Object.values(S)){
    if(t.own!==fac||cnt>12) continue;
    if(Math.random()<.3){t.u.i+=Math.floor(Math.random()*6)+1;cnt++}
  }
}

// ══════════════════════════════════════════════════════════════════
//  NEXT TURN
// ══════════════════════════════════════════════════════════════════
function nextTurn(){
  G.turn++;G.mo++;if(G.mo>12){G.mo=1;G.yr++}
  const ds=`${G.yr}.${String(G.mo).padStart(2,'0')}`;
  document.getElementById('tb-d').textContent=ds;
  const inc=income('jp');G.money+=inc;
  logMsg(`━━ TURN ${G.turn} / ${ds} | 歳入 +Y${inc} | 残高 Y${G.money} ━━`,'lt');
  aiTurn();applyFoW();updateTopbar();if(G.sel)updatePanel(G.sel);
}

function updateTopbar(){
  document.getElementById('tb-m').textContent=G.money.toLocaleString();
  document.getElementById('tb-i').textContent=`+Y${income('jp')}`;
  document.getElementById('tb-t').textContent=ownCount('jp');
  const wd=document.getElementById('tb-wars');
  wd.innerHTML=['cn','su','ge','al'].filter(f=>isWar('jp',f))
    .map(f=>`<span class="wbadge">WAR: ${FAC_SN[f]}</span>`).join('');
}

function logMsg(msg,cls='ld'){
  const c=document.getElementById('llist');
  const d=document.createElement('div');
  d.className=`le ${cls}`;d.textContent=msg;
  c.insertBefore(d,c.firstChild);

// ══════════════════════════════════════════════════════════════════
//  MAP CONTROLS
// ══════════════════════════════════════════════════════════════════
function setupControls(){
  const mi=document.getElementById('mi');
  const vp=document.getElementById('vp');
  let zoom=1.2,ox=0,oy=0,drag=false,lx=0,ly=0;

  // Initial position: center on Japan (SVG viewBox 0 0 1400 600, Japan is roughly at 75-80% x, 25-40% y)
  const vpW=vp.clientWidth, vpH=vp.clientHeight;
  // Japan center approx at SVG coord (1240, 200) in the 1400x600 viewBox
  // Initial zoom 1.2 means SVG renders at 1400*1.2 = 1680px wide
  // Center Japan: ox = vpW/2 - 1240*zoom, oy = vpH/2 - 200*zoom
  ox = vpW/2 - 1240*zoom;
  oy = vpH/2 - 220*zoom;

  function applyT(){mi.style.transform=`translate(${ox}px,${oy}px) scale(${zoom})`}
  applyT();

  vp.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('t-own')) return;
    drag=true;lx=e.clientX;ly=e.clientY;vp.classList.add('dragging');
  });
  window.addEventListener('mousemove',e=>{
    if(!drag) return;ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;applyT();
  });
  window.addEventListener('mouseup',()=>{drag=false;vp.classList.remove('dragging')});
  vp.addEventListener('wheel',e=>{
    e.preventDefault();
    const dz=e.deltaY*-.0009,nz=Math.min(Math.max(.2,zoom+dz),6);
    const r=vp.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    ox=mx-(mx-ox)*(nz/zoom);oy=my-(my-oy)*(nz/zoom);zoom=nz;applyT();
  },{passive:false});
  let lts=[];
  vp.addEventListener('touchstart',e=>{lts=[...e.touches]},{passive:true});
  vp.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1&&lts.length===1){ox+=e.touches[0].clientX-lts[0].clientX;oy+=e.touches[0].clientY-lts[0].clientY}
    else if(e.touches.length===2&&lts.length>=2){
      const pd=Math.hypot(lts[1].clientX-lts[0].clientX,lts[1].clientY-lts[0].clientY);
      const nd=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
      zoom=Math.min(Math.max(.2,zoom*(nd/pd)),6);
    }
    lts=[...e.touches];applyT();
  },{passive:false});
}
